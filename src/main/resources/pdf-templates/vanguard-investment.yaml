# Vanguard — brokerage / retirement.
#
# Status: UNVERIFIED. Same caveat as other investment templates.
id: vanguard-v1
institution: Vanguard
description: "Vanguard brokerage + retirement"
status: UNVERIFIED
layouts:
  - name: brokerage-single-line
    accountType: investment
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2}/\d{2,4})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d/yy"
    signConvention: as-is
    minAmount: 0.01
