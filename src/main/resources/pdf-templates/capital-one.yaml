# Capital One — Venture / Quicksilver / Savor / SavorOne, personal + business.
#
# Subtleties:
#
#   1. Older Cap One statements use "Mar 15" (abbreviated month) dates.
#      Newer (post-2022 rebrand) often use "3/15" numeric. We support both.
#
#   2. Foreign transaction fees surface as their own rows with wording like
#      "FOREIGN TRANSACTION FEE" — same single-line shape.
#
#   3. Cash advance sections have a separate "Cash Advance" header but the
#      rows themselves are the same shape as purchases.
#
#   4. Some business Cap One cards add a card-last-4 column before the
#      description ("xxxx1234 ...") — we tolerate that via the description's
#      greedy .+? capture.
#
# Status: VALIDATED — passes capital-one/credit-card-basic snapshot.
id: capital-one-v1
institution: Capital One
description: "Capital One consumer + business credit cards"
status: VALIDATED
layouts:
  # Abbreviated-month variant (older format).
  - name: credit-card-abbrev-month
    accountType: credit
    lineRegex: '^\s*(?<date>(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "MMM d"
    signConvention: credit-positive
    minAmount: 0.01

  # Numeric-date single-line (current statements).
  - name: credit-card-numeric-date
    accountType: credit
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01

  # Two-date variant (transaction + posting) seen on Spark business cards.
  - name: credit-card-two-date
    accountType: credit
    lineRegex: '^\s*\d{1,2}/\d{1,2}\s+(?<date>\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01
