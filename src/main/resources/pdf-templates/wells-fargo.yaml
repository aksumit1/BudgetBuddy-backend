# Wells Fargo — checking/savings + credit cards.
# See PATTERN_LEARNINGS.md. Note: WF has some payment-specific text
# patterns ("AUTOMATIC PAYMENT - THANK YOU") that parsePattern4140 in
# Java handles with sign-preserving logic. Those pass through here
# because the amount is already signed in the statement.
#
# Status: VALIDATED — passes wells-fargo/checking-basic snapshot.
id: wells-fargo-v1
institution: Wells Fargo
description: "Wells Fargo personal checking, savings, credit card"
status: VALIDATED
layouts:
  # Credit card two-date runs first to avoid losing to checking layout.
  - name: credit-card-two-date
    accountType: credit
    lineRegex: '^\s*\d{1,2}/\d{1,2}\s+(?<date>\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01

  # Checking with optional trailing balance. Negative lookahead prevents
  # matching the first date of a two-date credit card layout.
  - name: checking-single-line
    accountType: checking
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2})(?!\s+\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))(?:\s+[\d,.]+)?\s*$'
    dateFormat: "M/d"
    signConvention: as-is
    minAmount: 0.01
