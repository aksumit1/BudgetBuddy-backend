# SoFi — checking, savings, credit card, investing.
#
# Status: UNVERIFIED.
id: sofi-v1
institution: SoFi
description: "SoFi checking, savings, credit card"
status: UNVERIFIED
layouts:
  - name: checking-single-line
    accountType: checking
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2}/\d{2,4})\s+(?<description>.+?)\s+-?\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d/yy"
    signConvention: as-is
    minAmount: 0.01
