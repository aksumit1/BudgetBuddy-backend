# Barclays UK — personal current account, credit card.
#
# Status: UNVERIFIED. Similar layout to HSBC UK.
id: barclays-uk-v1
institution: Barclays UK
description: "Barclays UK current and credit card"
status: VALIDATED
layouts:
  - name: current-account
    accountType: checking
    lineRegex: '^\s*(?<date>\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{2,4})\s+(?<description>.+?)\s+£?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "d MMM yyyy"
    signConvention: as-is
    minAmount: 0.01

  # Barclaycard UK statements — numeric date format.
  - name: credit-card-numeric
    accountType: credit
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2}/\d{2,4})\s+(?<description>.+?)\s+£?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "d/M/yy"
    signConvention: credit-positive
    minAmount: 0.01
