# Chime — neobank checking, savings, secured credit card.
#
# Status: UNVERIFIED. Chime statements are very lightweight.
id: chime-v1
institution: Chime
description: "Chime checking, savings, credit builder"
status: UNVERIFIED
layouts:
  - name: checking-single-line
    accountType: checking
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2}/\d{2,4})\s+(?<description>.+?)\s+-?\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d/yy"
    signConvention: as-is
    minAmount: 0.01
