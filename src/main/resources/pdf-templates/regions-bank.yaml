# Regions Bank — checking, savings.
#
# Status: UNVERIFIED.
id: regions-bank-v1
institution: Regions Bank
description: "Regions Bank personal checking and savings"
status: UNVERIFIED
layouts:
  - name: checking-single-line
    accountType: checking
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+-?\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d"
    signConvention: as-is
    minAmount: 0.01
