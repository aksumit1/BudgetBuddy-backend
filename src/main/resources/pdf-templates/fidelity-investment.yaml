# Fidelity Investments — brokerage / retirement (IRA / 401k) activity statements.
#
# Status: UNVERIFIED. Investment statements are structurally different from
# bank statements: they have trade-date, settlement-date, action (Buy/Sell/
# Dividend/Contribution/Withdrawal), symbol, quantity, price, and net amount.
# We collapse to date + description + amount (where description encodes the
# action and symbol), which is lossy but matches the shape the rest of the
# pipeline expects. Refining this (capturing symbol, quantity separately) is
# a follow-up for investment-specific features.
id: fidelity-v1
institution: Fidelity
description: "Fidelity brokerage, IRA, 401(k) activity"
status: VALIDATED
layouts:
  - name: brokerage-single-line
    accountType: investment
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2}/\d{2,4})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d/yy"
    signConvention: as-is
    minAmount: 0.01
