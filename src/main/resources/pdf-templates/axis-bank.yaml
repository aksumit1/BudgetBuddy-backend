# Axis Bank (India) — savings + credit card.
#
# Status: UNVERIFIED.
id: axis-bank-in-v1
institution: Axis Bank
description: "Axis Bank India — savings, credit card"
status: UNVERIFIED
layouts:
  - name: savings-single-line
    accountType: savings
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2}/\d{2,4})\s+(?<description>.+?)\s+(?<amount>\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s+\d{1,3}(?:,\d{3})*(?:\.\d{2})\s*$'
    dateFormat: "d/M/yy"
    signConvention: negate
    minAmount: 0.01
