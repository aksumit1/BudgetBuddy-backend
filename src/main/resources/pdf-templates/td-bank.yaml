# TD Bank — checking, savings, credit cards.
#
# Status: UNVERIFIED. Mostly a fairly generic US checking layout.
id: td-bank-v1
institution: TD Bank
description: "TD Bank personal checking, savings, credit cards"
status: UNVERIFIED
layouts:
  - name: checking-single-line
    accountType: checking
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+-?\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d"
    signConvention: as-is
    minAmount: 0.01
