# Chase — personal + business checking / savings / credit card.
# See PATTERN_LEARNINGS.md for layout subtleties.
#
# Status: VALIDATED — passing snapshot tests
# (chase/checking-basic, chase/credit-card-basic as of v1 seed).
id: chase-v1
institution: Chase
description: "JPMorgan Chase — checking / savings / credit card (personal + business)"
status: VALIDATED
layouts:
  # Credit card two-date goes FIRST because the single-line layout would
  # otherwise greedily match the first date of a "03/15 03/16 ..." line
  # and treat the second date as part of the description.
  - name: credit-card-two-date
    accountType: credit
    lineRegex: '^\s*\d{1,2}/\d{1,2}\s+(?<date>\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01

  # Chase checking / one-date layout. The leading-date alternative has a
  # negative lookahead to ensure we don't match the first date of a
  # two-date credit-card line (that layout already ran).
  - name: checking-single-line
    accountType: checking
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2})(?!\s+\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))(?:\s+[\d,.]+)?\s*$'
    dateFormat: "M/d"
    signConvention: as-is
    minAmount: 0.01

  # Prefix-tolerant layout for reward/cashback lines:
  #   "1% Cashback Bonus +$0.06 10/06 AMAZON.COM"
  - name: credit-card-rewards-prefix
    accountType: credit
    lineRegex: '^\s*(?<description>.+?\+\$(?<amount>\d{1,3}(?:,\d{3})*(?:\.\d{2}))).*?(?<date>\d{1,2}/\d{1,2})\b'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01

  # Savings: similar to checking but the trailing balance column is almost
  # always present. Kept as a distinct layout.
  - name: savings-single-line
    accountType: savings
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s+[\d,.]+\s*$'
    dateFormat: "M/d"
    signConvention: as-is
    minAmount: 0.01
