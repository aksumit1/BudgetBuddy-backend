# Discover — credit cards (it / Miles / Cashback).
#
# Status: VALIDATED — passes discover/credit-card-basic snapshot.
id: discover-v1
institution: Discover
description: "Discover consumer credit cards"
status: VALIDATED
layouts:
  - name: credit-card-single-line
    accountType: credit
    lineRegex: '^\s*(?<date>\d{1,2}/\d{1,2}/\d{2})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*(?:\.\d{2}))\s*$'
    dateFormat: "M/d/yy"
    signConvention: credit-positive
    minAmount: 0.01
