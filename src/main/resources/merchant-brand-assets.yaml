# Merchant brand asset directory.
#
# Maps a merchant-name substring (matched case-insensitively against
# the lowercased merchant name) to its official domain. iOS uses the
# domain to render a brand mark via a logo service the client controls
# — no server-side logo fetch needed.
#
# Add a new merchant by appending an entry. Keep the match key short
# enough to be unique but specific enough not to alias unrelated
# merchants (e.g. "apple music" not "apple", "apple tv" not "apple").
#
# Convention: the more specific the key, the higher the match priority.

brands:
  netflix:
    domain: netflix.com
    displayName: Netflix
  hulu:
    domain: hulu.com
    displayName: Hulu
  disney+:
