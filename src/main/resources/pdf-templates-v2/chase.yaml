# Chase — Marriott Bonvoy, Amazon Prime Visa, Freedom (Flex/Unlimited), Sapphire
#
# Covers 15 statements in the 42-PDF corpus across 4 product brands sharing the
# Chase statement layout. Each brand differs in REWARD section (points balance,
# transferred-out totals) but the core card-detection + metadata extraction is
# uniform: "Account Ending XXXX", "New Balance $X", "Standard Purchases", etc.
#
# Status: unverified (gated on parity test against the 15 Chase corpus statements)
id: chase-v2
institution: Chase
description: "Chase credit cards (Marriott Bonvoy, Amazon Prime Visa, Freedom, Sapphire)"
status: unverified
extends: [common]

card_detection:
  institution_match:
    - any_of:
        - "(?i)JPMorgan\\s+Chase\\s+Bank"
        - "(?i)chase\\.com/(?:card|amazon|marriott|sapphire|freedom)"
        - "(?i)\\bCHASE\\s+(?:CARDMEMBER|FREEDOM|SAPPHIRE|UNITED|MARRIOTT)\\b"
        - "(?i)\\bPRIME\\s+VISA\\b"

  last_four:
    - pattern: "(?i)account\\s+(?:number|ending)\\s*(?:in\\s+)?(?:[#x*\\s-]+)?(\\d{4})\\b"
      filename_fallback: true
    # Chase often prints just "XXXX 4666" at the top of page 2. The (?<!\d)
    # lookbehind prevents matching the last 4 of a longer account number
    # (e.g. "Account 1234567" must NOT yield "4567").
    - pattern: "(?i)(?<!\\d)(\\d{4})\\s*$"
      filename_fallback: true

  account_holder:
    - source: above_account_ending
      lines_above_account: 1-3

metadata:
  statement_date:
    - label: "Statement Date"
      adjacent: date
    - label: "Closing Date"
      adjacent: date

  # Chase prints "Opening/Closing Date  12/14/25 - 01/13/26"
  statement_period:
    - pattern: "(?i)opening/closing\\s+date\\s+(\\d{1,2}/\\d{1,2}/\\d{2,4})\\s*-\\s*(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  new_balance:
    - label: "New Balance"
      adjacent: dollar
  previous_balance:
    - label: "Previous Balance"
      adjacent: dollar
  purchases_total:
    - label: "Purchases"
      adjacent: dollar
  payments_total:
    - label: "Payments, Credits"
      adjacent: dollar
    - label: "Payments and Credits"
      adjacent: dollar
    # Singular variant observed on Amazon Visa and Prime Visa statements:
    # "Payment, Credits -$50.00". Without this label the v2 parser misses
    # the payments-total row on every Amazon-co-branded Chase card.
    - label: "Payment, Credits"
      adjacent: dollar
  # Chase prints TWO "fees charged" lines: the period total ("Fees Charged
  # $0.00") AND the YTD total ("Total fees charged in 2025 $85.00"). A bare
  # label match catches both and the "last non-zero" tiebreaker picks the
  # YTD amount — wrong, because the audit's expected_debit includes fees
  # as a period bucket. Tighten to line-anchored pattern so only the
  # period-summary line matches; the YTD bucket lives in ytd_fees.
  # When the period-fees value is NON-ZERO Chase prefixes a "+" sign
  # ("Fees Charged +$85.00", "Fees Charged +$0.40") — without the optional
  # `[+-]?` allowance the regex misses the non-zero line and the audit's
  # expected_debit drops the fees bucket, producing a +fees-amount delta.
  fees_total:
    - pattern: "(?im)^\\s*Fees\\s+Charged\\s+[+-]?\\$([\\d,]+\\.\\d{2})"
  interest_total:
    - pattern: "(?im)^\\s*Interest\\s+Charged\\s+[+-]?\\$([\\d,]+\\.\\d{2})"
  ytd_fees:
    - pattern: "(?i)Total\\s+fees\\s+charged\\s+in\\s+\\d{4}\\s+\\$([\\d,]+\\.\\d{2})"
  ytd_interest:
    - pattern: "(?i)Total\\s+interest\\s+charged\\s+in\\s+\\d{4}\\s+\\$([\\d,]+\\.\\d{2})"

  credit_limit:
    - pattern: "(?im)^\\s*Credit\\s+Access\\s+Line\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Credit\\s+Limit\\s+\\$([\\d,]+\\.\\d{2})"
    # Some Chase statements (Prime Visa, Marriott Bonvoy) print the credit
    # limit as a round dollar amount with NO cents, e.g. "Credit Access Line
    # $20,000". The decimal-required variants above miss those rows, so we
    # add a no-decimal fallback anchored to "Access Line" / "Credit Limit".
    - pattern: "(?im)^\\s*Credit\\s+Access\\s+Line\\s+\\$([\\d,]+)\\s*$"
    - pattern: "(?im)^\\s*Credit\\s+Limit\\s+\\$([\\d,]+)\\s*$"
  available_credit:
    - pattern: "(?im)^\\s*Available\\s+Credit\\s+\\$([\\d,]+\\.\\d{2})"
    # Same no-decimal layout as credit_limit — must NOT match "Available for
    # Cash $4,000" which is a distinct field; "Available Credit" anchor is
    # specific.
    - pattern: "(?im)^\\s*Available\\s+Credit\\s+\\$([\\d,]+)\\s*$"
  minimum_payment_due:
    # Chase prints both "Minimum Payment Due $35.00" (Account Summary block)
    # and "Minimum Payment Due: $35.00" (account-messages block) — the colon
    # form is what some Prime Visa / Amazon Visa statements use, so accept
    # either separator.
    - pattern: "(?im)Minimum\\s+Payment\\s+Due[:\\s]+\\$([\\d,]+\\.\\d{2})"
  payment_due_date:
    - pattern: "(?im)Payment\\s+Due\\s+Date[:\\s]+(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  # APR table: "Purchases 18.99%(v)(d) - 0 - - 0 -"
  purchase_apr:
    - pattern: "(?im)^\\s*Purchases\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
  cash_advance_apr:
    - pattern: "(?im)^\\s*Cash\\s+Advances\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
  balance_transfer_apr:
    - pattern: "(?im)^\\s*Balance\\s+Transfers?\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
  penalty_apr:
    - pattern: "(?i)Penalty\\s+APR(?:\\s+of)?\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"

  # Points: Chase prints "Points balance: NN,NNN" on Sapphire variants and
  # "Total points available for redemption NN,NNN" on Prime Visa.
  # The negative lookbehind on "Previous\\s+" is load-bearing — without it
  # the "Previous points balance N,NNN" line on Prime Visa / Amazon Visa
  # wins over the current-cycle balance, so every import returns the prior
  # cycle's points instead of the current ones.
  points_balance:
    - pattern: "(?i)(?<!Previous\\s)(?:Total\\s+)?[Pp]oints?\\s+(?:balance|available\\s+for\\s+redemption)[:\\s]+(\\d{1,3}(?:,\\d{3})*|\\d+)"
  points_earned:
    - pattern: "(?i)[Pp]oints\\s+earned\\s+this\\s+period[:\\s]+(\\d{1,3}(?:,\\d{3})*|\\d+)"
    # The "transferred to <Partner Name>" phrase needs to accept multi-word
    # partner names: "Marriott Bonvoy", "Ritz-Carlton Rewards". The legacy
    # single-\\w+ pattern silently missed every Marriott Bonvoy statement.
    - pattern: "(?i)Total\\s+points\\s+(?:transferred\\s+to(?:\\s+\\w+){1,4}|earned)\\s+(\\d{1,3}(?:,\\d{3})*|\\d+)"
  previous_points_balance:
    - pattern: "(?i)Previous\\s+points\\s+balance\\s+(\\d{1,3}(?:,\\d{3})*|\\d+)"

  autopay_enabled:
    - label: "AUTOPAY IS ON"
    - label: "AUTOPAY IS OFF"
      pattern: "false"
  next_autopay_amount:
    - pattern: "(?i)next\\s+AutoPay\\s+payment\\s+for\\s+\\$([\\d,]+\\.\\d{2})"

  # "Your annual membership fee in the amount of $NN.NN will be billed on MM/DD/YYYY."
  annual_fee:
    - pattern: "(?i)annual\\s+membership\\s+fee\\s+in\\s+the\\s+amount\\s+of\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?i)Annual\\s+Fee\\s+\\$([\\d,]+\\.\\d{2})"
  annual_fee_due_date:
    - pattern: "(?i)annual\\s+membership\\s+fee.*?will\\s+be\\s+billed\\s+on\\s+(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  foreign_tx_fee_percent:
    - pattern: "(?i)[Ff]oreign\\s+[Tt]ransaction\\s+[Ff]ee.*?(\\d{1,2}\\.\\d{1,3})\\s*%"
    - pattern: "(?i)(\\d{1,2}(?:\\.\\d{1,3})?)\\s*%\\s+(?:of\\s+)?(?:each\\s+)?foreign\\s+(?:transaction|purchase)"
    # Chase disclosure prose commonly prints the fee as a bare integer:
    # "There is a foreign transaction fee of 3% of the U.S. dollar amount".
    # The decimal-required variants above miss this — must accept an
    # integer percent when anchored to "fee of".
    - pattern: "(?i)[Ff]oreign\\s+[Tt]ransaction\\s+[Ff]ee\\s+of\\s+(\\d{1,2})\\s*%"

  billing_days:
    - pattern: "(?i)(?<!\\d)(\\d{1,3})\\s+Days?\\s+in\\s+Billing\\s+(?:Period|Cycle)"

# Family-card / authorized-user cardholder anchors.
# No Chase family-card statements appear in the current corpus, so these
# patterns are scaffolding for the layouts Chase prints when an account has
# multiple cardholders:
#  (a) Per-cardholder header introduced by "Transactions for <Name>" or
#      "Charges Made By <Name>" above an authorized-user block, followed by
#      "Card ending in NNNN" / "ending in NNNN" on the same or next line.
#  (b) Primary-holder card-ending line "<NAME> account ending in NNNN" on
#      summary pages.
# Both anchors are conservative — they won't fire on the single-cardholder
# Chase statements that dominate today's corpus, so adding them is a no-op
# for current PDFs while enabling future family-card support without code
# changes.
card_holders:
  - pattern: "(?im)^\\s*(?:Transactions\\s+for|Charges\\s+Made\\s+By)\\s+(?<userName>[A-Z][A-Za-z'\\.\\- ]+?)\\s+(?:ending\\s+in\\s+|card\\s+ending\\s+in\\s+|-\\s+)(?<cardLastFour>\\d{4})\\b"
  - pattern: "(?im)^\\s*(?<userName>[A-Z][A-Za-z'\\.\\- ]+?)\\s+(?:account|card)\\s+ending\\s+in\\s+(?<cardLastFour>\\d{4})\\b"

preprocessing:
  fx_block_strip:
    - kind: chase-exchg-rate
    - kind: chase-fee-parentref
  stitch:
    section_headers:
      - "Standard Purchases"
      - "Payments, Credits and Adjustments"
      - "Payments and Other Credits"
      - "Cash Advances"
      - "Balance Transfers"
      - "Fees Charged"
      - "Interest Charged"
      - "Purchases Prior to"
      - "Total Payments"
      - "Total Purchases"
      - "Total Fees"
      - "Total Interest"

