# Chase — Marriott Bonvoy, Amazon Prime Visa, Freedom (Flex/Unlimited), Sapphire
#
# Covers 15 statements in the 42-PDF corpus across 4 product brands sharing the
# Chase statement layout. Each brand differs in REWARD section (points balance,
# transferred-out totals) but the core card-detection + metadata extraction is
# uniform: "Account Ending XXXX", "New Balance $X", "Standard Purchases", etc.
#
# Status: unverified (gated on parity test against the 15 Chase corpus statements)
id: chase-v2
institution: Chase
description: "Chase credit cards (Marriott Bonvoy, Amazon Prime Visa, Freedom, Sapphire)"
status: unverified

card_detection:
  institution_match:
    - any_of:
        - "(?i)JPMorgan\\s+Chase\\s+Bank"
        - "(?i)chase\\.com/(?:card|amazon|marriott|sapphire|freedom)"
        - "(?i)\\bCHASE\\s+(?:CARDMEMBER|FREEDOM|SAPPHIRE|UNITED|MARRIOTT)\\b"
        - "(?i)\\bPRIME\\s+VISA\\b"

  last_four:
    - pattern: "(?i)account\\s+(?:number|ending)\\s*(?:in\\s+)?(?:[#x*\\s-]+)?(\\d{4})\\b"
      filename_fallback: true
    - pattern: "(?i)(\\d{4})\\s*$"   # Chase often prints just "XXXX 4666" at the top of page 2
      filename_fallback: true

  account_holder:
    - source: above_account_ending
      lines_above_account: 1-3

metadata:
  statement_date:
    - label: "Statement Date"
      adjacent: date
    - label: "Closing Date"
      adjacent: date

  # Chase prints "Opening/Closing Date  12/14/25 - 01/13/26"
  statement_period:
    - pattern: "(?i)opening/closing\\s+date\\s+(\\d{1,2}/\\d{1,2}/\\d{2,4})\\s*-\\s*(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  new_balance:
    - label: "New Balance"
      adjacent: dollar
  previous_balance:
    - label: "Previous Balance"
      adjacent: dollar
  purchases_total:
    - label: "Purchases"
      adjacent: dollar
  payments_total:
    - label: "Payments, Credits"
      adjacent: dollar
    - label: "Payments and Credits"
      adjacent: dollar
  fees_total:
    - label: "Fees Charged"
      adjacent: dollar
  interest_total:
    - label: "Interest Charged"
      adjacent: dollar

preprocessing:
  fx_block_strip:
    - kind: chase-exchg-rate
    - kind: chase-fee-parentref
  stitch:
    section_headers:
      - "Standard Purchases"
      - "Payments, Credits and Adjustments"
      - "Payments and Other Credits"
      - "Cash Advances"
      - "Balance Transfers"
      - "Fees Charged"
      - "Interest Charged"
      - "Purchases Prior to"
      - "Total Payments"
      - "Total Purchases"
      - "Total Fees"
      - "Total Interest"

layouts:
  # Chase two-date row (most common):
  #   "12/27 12/28 STARBUCKS STORE 0030 SEATTLE WA -$13.46"
  - name: chase-credit-card-two-date
    accountType: credit
    lineRegex: '^(?<date>\d{1,2}/\d{1,2})\s+\d{1,2}/\d{1,2}\s+(?<description>.+?)\s+(?<amount>-?\$?\d{1,3}(?:,\d{3})*\.\d{2})\s*$'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01

  # Chase Amazon Prime Visa single-date variant:
  #   "04/12 CHIPOTLE MEX GR ONLINE NEWPORT BEACH CA 20.00"
  - name: chase-prime-visa-single-date
    accountType: credit
    lineRegex: '^(?<date>\d{1,2}/\d{1,2})\s+(?<description>.+?)\s+(?<amount>-?\$?\d{1,3}(?:,\d{3})*\.\d{2})\s*$'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01
