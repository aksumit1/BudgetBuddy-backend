# Apple Card — issued by Goldman Sachs.
#
# Layout: single-card, Daily Cash rewards, Total Balance / Minimum Payment Due
# header on page 1, single-line transactions with "AAPL/HRZ" pattern in many
# merchant fields. We don't have an Apple Card PDF in the corpus yet so this
# template is UNVERIFIED — patterns mirror the legacy AppleCardIssuerProfile.
#
# Status: unverified (no corpus PDF yet)
id: apple-card-v2
institution: Apple Card
description: "Apple Card — issued by Goldman Sachs"
status: unverified

card_detection:
  institution_match:
    - any_of:
        - "(?i)apple\\s+card"
        - "(?i)goldman\\s+sachs\\s+bank"
        - "(?i)card\\.apple\\.com"

  last_four:
    - pattern: "(?i)account\\s+ending\\s+in[\\s:]+(\\d{4})\\b"
    - pattern: "(?i)card\\s+ending\\s+in[\\s:]+(\\d{4})\\b"

  account_holder:
    - source: above_account_ending
      lines_above_account: 1-3

metadata:
  statement_date:
    - label: "Closing Date"
      adjacent: date
    - label: "Statement Closing Date"
      adjacent: date

  statement_period:
    - pattern: "(?i)statement\\s+period[:\\s]+(\\d{1,2}/\\d{1,2}/\\d{2,4})\\s*[-–to]+\\s*(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  new_balance:
    - pattern: "(?im)^\\s*Total\\s+Balance\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*New\\s+Balance\\s+\\$([\\d,]+\\.\\d{2})"

  previous_balance:
    - pattern: "(?im)^\\s*Previous\\s+(?:Monthly\\s+)?Balance\\s+\\$([\\d,]+\\.\\d{2})"

  purchases_total:
    - pattern: "(?im)^\\s*(?:Total\\s+)?Purchases\\s+\\$([\\d,]+\\.\\d{2})"

  payments_total:
    - pattern: "(?im)^\\s*Payments(?:\\s+(?:and|&)\\s+Credits)?\\s+-?\\$([\\d,]+\\.\\d{2})"

  fees_total:
    - pattern: "(?im)^\\s*Fees(?:\\s+Charged)?\\s+\\$([\\d,]+\\.\\d{2})"

  interest_total:
    - pattern: "(?im)^\\s*Interest\\s+Charged\\s+\\$([\\d,]+\\.\\d{2})"

  credit_limit:
    - pattern: "(?im)^\\s*Credit\\s+Limit\\s+\\$([\\d,]+\\.\\d{2})"
  available_credit:
    - pattern: "(?im)^\\s*Available\\s+Credit\\s+\\$([\\d,]+\\.\\d{2})"
  minimum_payment_due:
    - pattern: "(?im)Minimum\\s+Payment\\s+Due\\s+\\$([\\d,]+\\.\\d{2})"
  payment_due_date:
    - pattern: "(?im)Payment\\s+Due\\s+Date\\s+(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  purchase_apr:
    - pattern: "(?im)^\\s*Purchases?\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
    - pattern: "(?i)Variable\\s+APR\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"

  # Apple Card: Daily Cash balance (cashback equivalent)
  cashback_balance:
    - pattern: "(?i)Total\\s+Daily\\s+Cash\\s+(?:Earned|Balance)\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?i)Daily\\s+Cash\\s+Balance\\s+\\$([\\d,]+\\.\\d{2})"

  autopay_enabled:
    - label: "AUTOMATIC PAYMENT"
  billing_days:
    - pattern: "(?i)(?<!\\d)(\\d{1,3})\\s+Days?\\s+in\\s+Billing\\s+(?:Period|Cycle)"

layouts:
  - name: apple-card-single-line
    accountType: credit
    lineRegex: '^(?<date>\d{1,2}/\d{1,2}/\d{2,4})\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*\.\d{2})\s*$'
    dateFormat: "M/d/yy"
    signConvention: credit-positive
    minAmount: 0.01
