  # Citi Costco Anywhere Visa — ports CitiCostcoStatementFixtureTest. The
  # Costco variant shares most of the Double Cash layout but adds:
  #   - whole-dollar credit limits ("Credit Limit  $15,000", no cents),
  #   - "Available Credit Limit" wording (extra "Limit" word),
  #   - single-line cashback balance ("Total Costco Cash Back Rewards
  #     Balance: $262.04"), and
  #   - a Penalty APR disclosure ("Penalty APR of 29.99%.").
  - name: costco-anywhere-visa
    input: |
      TEST CARDHOLDER
      Costco Anywhere Visa® Card by Citi
      Member Since 2007. Account number ending in: 5050
      www.citicards.com
      APRIL STATEMENT
      Billing Period: 03/21/26-04/21/26
      New balance as of 04/21/26:  $1,958.02
      Minimum payment due:  $41.00
      Payment due date:  05/17/26
      Penalty APR of 29.99%.
      Costco Cash Back Rewards Summary
      Total Cashback:
      $262.04 as of 04/21/26
      Your next AutoPay payment of $1,958.02 will be
       deducted from your bank account on 05/17/2026.
      Account Summary
      Previous balance  $2,039.46
      Payments -$2,039.46
      Purchases  +$1,958.02
      Cash advances  +$0.00
      New balance  $1,958.02
      Credit Limit
      Credit Limit  $15,000
      Available Credit Limit  $13,041
      Interest charge calculation Days in billing cycle: 32
       Standard Purch 18.74% (V) $0.00 (D) $0.00
       Standard Adv 28.74% (V) $0.00 (D) $0.00
      Total Costco Cash Back Rewards Balance: $262.04
    expected:
      new_balance: 1958.02
      previous_balance: 2039.46
      purchases_total: 1958.02
      payments_total: 2039.46
      credit_limit: 15000
      available_credit: 13041
      minimum_payment_due: 41.00
