      purchase_apr: 18.74
      cash_advance_apr: 28.74
      penalty_apr: 29.99
      billing_days: 32
      autopay_enabled: true
      next_autopay_amount: 1958.02
      cashback_balance: 262.04

  # Earlier-month Costco statements wrap the cashback label onto two lines:
  #   "Total Costco Cash Back Rewards Balance"
  #   " Year to Date :  $163.64"
  # Same cashback_balance field must populate from this layout (label-only
  # rule + adjacent-dollar fallback handles it).
  - name: costco-cashback-wrapped-label
    input: |
      Total Costco Cash Back Rewards Balance
       Year to Date :  $163.64
    expected:
      cashback_balance: 163.64

layouts:
  # Citi two-date row (Double Cash + Costco):
  #   "12/02 12/03 BELLEVUE SCHOOL DISTRI BELLEVUE WA $5.00"
  - name: citi-credit-card-two-date
    accountType: credit
    lineRegex: '^(?<date>\d{1,2}/\d{1,2})\s+\d{1,2}/\d{1,2}\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*\.\d{2})\s*$'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01

  # Costco statements sometimes use a single-date variant in the rewards
  # section. We accept either form; first-match wins.
  - name: citi-credit-card-single-date
    accountType: credit
    lineRegex: '^(?<date>\d{1,2}/\d{1,2}(?:/\d{2,4})?)\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*\.\d{2})\s*$'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01
