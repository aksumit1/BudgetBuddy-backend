# Citi — Double Cash, Costco Anywhere, ThankYou variants
#
# Covers 9 statements (5 Double Cash + 4 Costco). Citi's statement layout has a
# two-column page (transactions on the left, rewards summary on the right) that
# PDFBox extracts as interleaved lines — so the stitching rules below must
# match the rewards-prose phrases Citi prints to avoid them being treated as
# section breaks.
#
# Status: unverified
id: citi-v2
institution: Citibank
description: "Citi credit cards (Double Cash, Costco Anywhere, ThankYou)"
status: unverified

card_detection:
  institution_match:
    - any_of:
        - "(?i)\\bcitibank\\b"
        - "(?i)\\bciti\\b"
        - "(?i)citi\\.com"
        - "(?i)\\bcosto\\s+anywhere\\b"
        - "(?i)\\bdouble\\s+cash\\b"
        - "(?i)\\bThankYou\\s+Points\\b"

  # Citi prints "Account number ending in: 1618" or "Account ending in 1618".
  # We accept both spellings; filename fallback OFF for Citi because filenames
  # like "April2026.pdf" would otherwise grab "2026" as the last 4.
  last_four:
    - pattern: "(?i)Account\\s+(?:number\\s+)?ending\\s+in[\\s:]+(?:[#x*\\s-]+)?(\\d{4})\\b"
    - pattern: "(?i)Account\\s+number(?:\\s+ending\\s+in)?[\\s:]+(?:[#x*\\s-]+)?(\\d{4})\\b"

  account_holder:
    - source: above_account_ending
      lines_above_account: 1-5

metadata:
  statement_date:
    - label: "Statement / Closing Date"
      adjacent: date
    - label: "Closing Date"
      adjacent: date

  # Citi prints "Billing Period: 12/05/25 - 01/04/26"
  statement_period:
    - pattern: "(?i)billing\\s+period[:\\s]+(\\d{1,2}/\\d{1,2}/\\d{2,4})\\s*[-–]\\s*(\\d{1,2}/\\d{1,2}/\\d{2,4})"
    - pattern: "(?i)statement\\s+period[:\\s]+(\\d{1,2}/\\d{1,2}/\\d{2,4})\\s*[-–]\\s*(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  # Citi prints Activity Summary as one-row-per-field with optional ± prefix:
  #   "Payments -$2,039.46"
  #   "Purchases  +$1,958.02"
  # We use explicit patterns anchored at start-of-line to avoid matching
  # rewards-section lines like "1% on all other purchases  +$0.08".
  new_balance:
    - pattern: "(?im)^\\s*New\\s+Balance\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?i)New\\s+Balance(?:\\s+as\\s+of\\s+\\d{1,2}/\\d{1,2}/\\d{2,4})?\\s+\\$([\\d,]+\\.\\d{2})"

  previous_balance:
    - pattern: "(?im)^\\s*Previous\\s+Balance\\s+[-+]?\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?i)Previous\\s+Balance\\s+[-+]?\\$([\\d,]+\\.\\d{2})"

  purchases_total:
    - pattern: "(?im)^\\s*Purchases\\s+[-+]?\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Standard\\s+Purchases\\s+[-+]?\\$([\\d,]+\\.\\d{2})"

  # Citi prints "Payments -$4,784.23" AND "Credits -$319.45" as separate rows
  # under the same "Payments, Credits and Adjustments" section. The total this
  # app reports as payments_total is their SUM. payments_total_sum: true tells
  # the evaluator to add all matching rule values instead of taking the first.
  payments_total_sum: true
  payments_total:
    - pattern: "(?im)^\\s*Payments\\s+[-+]?\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Credits\\s+[-+]?\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Adjustments\\s+[-+]?\\$([\\d,]+\\.\\d{2})"

  fees_total:
    - pattern: "(?im)^\\s*Fees\\s+Charged\\s+[-+]?\\$([\\d,]+\\.\\d{2})"

  interest_total:
    - pattern: "(?im)^\\s*Interest\\s+Charged\\s+[-+]?\\$([\\d,]+\\.\\d{2})"

  credit_limit:
    - pattern: "(?im)^\\s*Credit\\s+Limit\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Total\\s+Credit\\s+Limit\\s+\\$([\\d,]+\\.\\d{2})"
    # Citi Costco prints whole-dollar credit limits without cents: "Credit Limit  $15,000".
    - pattern: "(?im)^\\s*Credit\\s+Limit\\s+\\$([\\d,]+)(?!\\.)\\s*$"
  available_credit:
    - pattern: "(?im)^\\s*Available\\s+Credit\\s+\\$([\\d,]+\\.\\d{2})"
    # Citi Costco uses "Available Credit Limit" (extra "Limit" word) and prints
    # whole dollars without cents.
    - pattern: "(?im)^\\s*Available\\s+Credit\\s+Limit\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Available\\s+Credit\\s+Limit\\s+\\$([\\d,]+)(?!\\.)\\s*$"
  minimum_payment_due:
    - pattern: "(?im)^\\s*Minimum\\s+payment\\s+due[:\\s]+\\$([\\d,]+\\.\\d{2})"
  payment_due_date:
    - pattern: "(?im)^\\s*Payment\\s+due\\s+date[:\\s]+(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  purchase_apr:
    - pattern: "(?im)^\\s*Standard\\s+Purch\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
    - pattern: "(?im)^\\s*(?:Standard\\s+)?Purchases\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
  cash_advance_apr:
    - pattern: "(?im)^\\s*Standard\\s+Adv\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
    - pattern: "(?im)^\\s*Cash\\s+Advances?\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
  balance_transfer_apr:
    - pattern: "(?im)^\\s*Balance\\s+Transfers?\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
  penalty_apr:
    - pattern: "(?i)Penalty\\s+APR(?:\\s+of)?\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"

  # Citi ThankYou Points balance + period earnings.
  # Real statements print the balance on its own line below a bare label, so
  # we use a label-with-next-line scan in addition to the inline form.
  points_balance:
    - label: "Total ThankYou Points Balance"
    - pattern: "(?i)Total\\s+ThankYou\\s+Points\\s+Balance[:\\s]+(\\d{1,3}(?:,\\d{3})*|\\d+)"
    - pattern: "(?i)ThankYou\\s+Points\\s+Balance[:\\s]+(\\d{1,3}(?:,\\d{3})*|\\d+)"
  points_earned:
    - pattern: "(?i)Total\\s+Earned\\s+this\\s+Period[:\\s]+(\\d{1,3}(?:,\\d{3})*|\\d+)"
    - pattern: "(?i)ThankYou\\s+Points\\s+Earned[:\\s]*(\\d{1,3}(?:,\\d{3})*|\\d+)"

  # Citi Costco cashback certificate balance
  cashback_balance:
    - pattern: "(?i)Reward\\s+(?:Center\\s+)?Balance\\s+\\$([\\d,]+\\.\\d{2})"
    # Citi Costco Anywhere prints "Total Costco Cash Back Rewards Balance: $X.XX"
    # on a single line. Earlier-month statements wrap the label onto two lines,
    # so we also accept the label-only line and let the adjacent-dollar fallback
    # find the value on the next non-blank line ("Year to Date :  $163.64").
    - pattern: "(?i)Total\\s+Costco\\s+Cash\\s+Back\\s+Rewards\\s+Balance[:\\s]+\\$([\\d,]+\\.\\d{2})"
    - label: "Total Costco Cash Back Rewards Balance"
      adjacent: dollar

  # Citi prints "Your next AutoPay payment of $X" ONLY when AutoPay is enrolled.
  autopay_enabled:
    - label: "Your next AutoPay payment of"
  next_autopay_amount:
    - pattern: "(?is)Your\\s+next\\s+AutoPay\\s+payment\\s+of\\s+\\$([\\d,]+\\.\\d{2})"

  # Citi YTD totals — printed in the "totals year-to-date" sub-block.
  ytd_fees:
    - pattern: "(?i)Total\\s+fees\\s+charged\\s+in\\s+\\d{4}\\s+\\$([\\d,]+\\.\\d{2})"
  ytd_interest:
    - pattern: "(?i)Total\\s+interest\\s+charged\\s+in\\s+\\d{4}\\s+\\$([\\d,]+\\.\\d{2})"

  annual_fee:
    - pattern: "(?i)Annual\\s+(?:Membership\\s+)?Fee\\s+\\$([\\d,]+\\.\\d{2})"
  foreign_tx_fee_percent:
    - pattern: "(?i)[Ff]oreign\\s+[Tt]ransaction\\s+[Ff]ee[^%]*?(\\d{1,2}(?:\\.\\d{1,3})?)\\s*%"
  billing_days:
    - pattern: "(?i)Days?\\s+in\\s+billing\\s+(?:cycle|period)[:\\s]+(\\d{1,3})"
    - pattern: "(?i)(?<!\\d)(\\d{1,3})\\s+Days?\\s+in\\s+Billing\\s+(?:Period|Cycle)"

preprocessing:
  stitch:
    # Citi prints these rewards-prose phrases on the right column. They look
    # like ALL-CAPS continuation lines, so without listing them as section
    # headers the stitcher would either glue them onto the previous
    # transaction OR (worse) treat them as a section break that flushes
    # the in-progress transaction.
    section_headers:
      - "Standard Purchases"
      - "Payments, Credits and Adjustments"
      - "Payments, Credits"
      - "TWO WAYS TO EARN"
      - "ThankYou Points from Citi"
      - "ThankYou Points on Purchases"
      - "ThankYou Points on Payments"
      - "Earnings This Billing Period"
      - "Eligible Purchases"
      - "Eligible Payments"
      - "PURCHASE TRACKER"
      - "Bonus from Citi Travel"
      - "Total ThankYou Points Balance"
      - "Reward Center Balance"
      - "Other Bonus"
      - "Total Earned this Period"

