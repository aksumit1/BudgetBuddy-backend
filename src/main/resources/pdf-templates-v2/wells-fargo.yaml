# Wells Fargo — Active Cash, Autograph, Reflect credit cards
#
# Covers the 4 Wells Fargo statements in the corpus (Document1-4.pdf). WF
# statements are sparse — 5-7 transactions each — and use a single-date layout
# with the amount at end-of-line.
#
# Status: unverified
id: wells-fargo-v2
institution: Wells Fargo
description: "Wells Fargo credit cards"
status: unverified

card_detection:
  institution_match:
    - any_of:
        - "(?i)\\bWells\\s+Fargo\\b"
        - "(?i)wellsfargo\\.com"
        - "(?i)Active\\s+Cash\\s+(?:Visa|World)?\\s*Card"
        - "(?i)\\bAUTOGRAPH\\b"
        - "(?i)\\bREFLECT\\b"

  last_four:
    - pattern: "(?i)account\\s+ending\\s+(?:in\\s+)?(\\d{4})\\b"
      filename_fallback: true
    - pattern: "(?i)Account\\s+number[\\s:]+[*xX\\s-]*(\\d{4})\\b"
      filename_fallback: true

  account_holder:
    - source: above_account_ending
      lines_above_account: 1-3

metadata:
  statement_date:
    - label: "Statement Date"
      adjacent: date
    - label: "Closing Date"
      adjacent: date

  # WF prints "Statement period: 03/19/2026 to 04/17/2026"
  statement_period:
    - pattern: "(?i)statement\\s+period[:\\s]+(\\d{1,2}/\\d{1,2}/\\d{2,4})\\s+to\\s+(\\d{1,2}/\\d{1,2}/\\d{2,4})"
    - pattern: "(?i)billing\\s+period[:\\s]+(\\d{1,2}/\\d{1,2}/\\d{2,4})\\s*[-–to]\\s*(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  new_balance:
    - label: "New Balance"
      adjacent: dollar
    - label: "New Balance Total"
      adjacent: dollar
  previous_balance:
    - label: "Previous Balance"
      adjacent: dollar
  purchases_total:
    - label: "Purchases, Cash Advances & Balance Transfers"
      adjacent: dollar
    - label: "Purchases"
      adjacent: dollar
  payments_total:
    - label: "Payments and Credits"
      adjacent: dollar
    - label: "Payments"
      adjacent: dollar
  fees_total:
    - label: "Fees Charged"
      adjacent: dollar
  interest_total:
    - label: "Interest Charged"
      adjacent: dollar

  credit_limit:
    - pattern: "(?im)^\\s*Total\\s+Credit\\s+Limit\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Credit\\s+Limit\\s+\\$([\\d,]+\\.\\d{2})"
    # WF Active Cash prints integer-dollar credit limits ("$10,000" not "$10,000.00").
    - pattern: "(?im)^\\s*Total\\s+Credit\\s+Limit\\s+\\$([\\d,]+(?:\\.\\d{2})?)"
    - pattern: "(?im)^\\s*Credit\\s+Limit\\s+\\$([\\d,]+(?:\\.\\d{2})?)"
  available_credit:
    - pattern: "(?im)^\\s*Total\\s+Available\\s+Credit\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Available\\s+Credit\\s+\\$([\\d,]+\\.\\d{2})"
    # WF Active Cash prints integer-dollar available credit ("$8,765" not "$8,765.00").
    - pattern: "(?im)^\\s*Total\\s+Available\\s+Credit\\s+\\$([\\d,]+(?:\\.\\d{2})?)"
    - pattern: "(?im)^\\s*Available\\s+Credit\\s+\\$([\\d,]+(?:\\.\\d{2})?)"
  minimum_payment_due:
    - pattern: "(?im)Minimum\\s+Payment\\s+Due\\s+\\$([\\d,]+\\.\\d{2})"
    # WF Active Cash payment-block prints "Minimum Payment $X.XX" without "Due"
    # (the "Due Date" appears on a separate line above).
    - pattern: "(?im)Minimum\\s+Payment\\s+\\$([\\d,]+\\.\\d{2})"
  payment_due_date:
    - pattern: "(?im)Payment\\s+Due\\s+Date\\s+(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  purchase_apr:
    - pattern: "(?im)^\\s*Purchases\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
  cash_advance_apr:
    - pattern: "(?im)^\\s*Cash\\s+Advances?\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
  balance_transfer_apr:
    - pattern: "(?im)^\\s*Balance\\s+Transfers?\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"
  penalty_apr:
    - pattern: "(?i)Penalty\\s+APR\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"

  # WF Active Cash prints rewards as a dollar value (Cash Rewards Balance).
  # The Active Cash variant prints "Rewards balance as of: MM/DD/YYYY  $XX.XX"
  # (no "Cash" prefix) under a "Wells Fargo Rewards Summary" header.
  cashback_balance:
    - pattern: "(?i)Cash\\s+Rewards?\\s+Balance\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?i)Total\\s+Cash\\s+Rewards?\\s+Earned\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?i)Rewards?\\s+balance(?:\\s+as\\s+of[^$\\n]*)?\\s+\\$([\\d,]+\\.\\d{2})"
  # WF Autograph prints points balance.
  points_balance:
    - pattern: "(?i)(?:Total\\s+)?Points\\s+Balance[:\\s]+(\\d{1,3}(?:,\\d{3})*|\\d+)"

  autopay_enabled:
    - label: "AUTOPAY IS ON"
    # WF doesn't print a discrete "AUTOPAY IS ON" line. Instead it embeds an
    # autopay sentence in the payment-due block:
    #   "$0 - $1,234.56 will be deducted from your account and credited as your
    #    automatic payment on 05/12/26."
    - label: "credited as your automatic payment"
    - label: "AUTOPAY IS OFF"
      pattern: "false"

  # Wells phrases next autopay as a range: "$X - $Y will be deducted ...
  # automatic payment on MM/DD/YY". We capture the UPPER bound (Y) because
  # that's the maximum the user could be charged for this cycle.
  next_autopay_amount:
    - pattern: "(?is)\\$[\\d,]+(?:\\.\\d{2})?\\s*-\\s*\\$([\\d,]+\\.\\d{2})\\s+will\\s+be\\s+deducted[^.]*?automatic\\s+payment"

  # Wells lays YTD totals as two label-only lines followed by two amount-only
  # lines (the per-line dollar amounts are stacked AFTER both labels). We use
  # a (?is) DOTALL pattern to span the layout. The interest variant skips the
  # first $-value (which belongs to fees) and captures the second.
  ytd_fees:
    - pattern: "(?is)Total\\s+Fees\\s+Charged\\s+in\\s+\\d{4}[^$]*?\\$([\\d,]+\\.\\d{2})"
  ytd_interest:
    - pattern: "(?is)Total\\s+Interest\\s+Charged\\s+in\\s+\\d{4}[^$]*?\\$(?:[\\d,]+\\.\\d{2})[^$]*?\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?is)Total\\s+Interest\\s+Charged\\s+in\\s+\\d{4}[^$]*?\\$([\\d,]+\\.\\d{2})"

  annual_fee:
    - pattern: "(?i)Annual\\s+(?:Membership\\s+)?Fee\\s+\\$([\\d,]+\\.\\d{2})"
  foreign_tx_fee_percent:
    - pattern: "(?i)[Ff]oreign\\s+[Tt]ransaction\\s+[Ff]ee[^%]*?(\\d{1,2}(?:\\.\\d{1,3})?)\\s*%"
  billing_days:
    - pattern: "(?i)(?<!\\d)(\\d{1,3})\\s+Days?\\s+in\\s+Billing\\s+(?:Period|Cycle)"

samples:
  # Active Cash Visa Signature synthetic fixture — ported from
  # WellsFargoActiveCashStatementFixtureTest. Covers core summary fields,
  # section-period totals, APRs, statement-period end date, autopay sentence
  # inference, cash-back rewards balance, and YTD totals. Annual fee, points
  # balance, and points earned are intentionally absent — the Active Cash card
  # has no annual fee and rewards as dollars (not points), so the evaluator
  # must return null for those fields.
  - name: active-cash-visa-signature
    input: |
      NOTICE:  SEE REVERSE SIDE FOR IMPORTANT INFORMATION ABOUT YOUR ACCOUNT
      Wells Fargo Online®: wellsfargo.com
      24-hour Customer Service: 1-866-229-6633
      Payment
      Payment Due Date 05/12/2026
      Minimum Payment $137.00
      New Balance $1,234.56
      WELLS FARGO ACTIVE CASH VISA SIGNATURE® CARD
      Account ending in 1234
      Statement Period 03/19/2026 to 04/17/2026
      Page 1 of 3
       $0 - $1,234.56 will be deducted from your account and credited as your automatic payment on 05/12/26.
      Account Summary
      Previous Balance $500.00
      - Payments $500.00
      - Other Credits $0.00
      + Cash Advances $0.00
      + Purchases, Balance Transfers &
      Other Charges
      $1,234.56
      + Fees Charged $0.00
      + Interest Charged $0.00
      = New Balance $1,234.56
      Total Credit Limit $10,000
      Cash Advance Limit $2,000
      Total Available Credit $8,765
      Available for Cash Advances $2,000
      Wells Fargo Rewards Summary
      Rewards balance as of: 03/31/2026      $42.50
      Transactions
      Payments
      04/12 04/12 F353100FNXXXCHGDDA AUTOMATIC PAYMENT - THANK YOU 500.00
      TOTAL PAYMENTS FOR THIS PERIOD $500.00
      Purchases, Balance Transfers & Other Charges
      1234 03/18 03/19 2494166EX8ASR99D0 GROCERY STORE BELLEVUE  WA 116.59
      1234 03/29 03/29 2424052F9L9XPN1A4 GAS STATION RENTON  WA 58.20
      1234 04/01 04/01 2469216FB2XPSN2XR INTERNET PROVIDER 888-555-0100 PA 184.86
      1234 04/16 04/16 2413746FSEJG588FM MERCHANT XYZ 888-555-0199 TN 874.91
      TOTAL PURCHASES, BALANCE TRANSFERS & OTHER CHARGES FOR THIS PERIOD $1,234.56
      Fees Charged
      TOTAL FEES CHARGED FOR THIS PERIOD $0.00
      Interest Charged
      INTEREST CHARGE ON PURCHASES 0.00
      INTEREST CHARGE ON CASH ADVANCES 0.00
      TOTAL INTEREST CHARGED FOR THIS PERIOD $0.00
      2026 Totals Year-to-Date
      TOTAL FEES CHARGED IN 2026
      TOTAL INTEREST CHARGED IN 2026
      $0.00
      $0.00
      Interest Charge Calculation
      Type of Balance
      Annual
      Percentage Rate
       (APR)
      PURCHASES 18.49% variable $0.00 30 $0.00 $1,234.56
      CASH ADVANCES 29.49% variable $0.00 30 $0.00 $0.00
    expected:
      new_balance: 1234.56
      previous_balance: 500.00
      credit_limit: 10000
      available_credit: 8765
      minimum_payment_due: 137.00
      payment_due_date: 05/12/2026
      purchases_total: 1234.56
      payments_total: 500.00
      fees_total: 0.00
      interest_total: 0.00
      purchase_apr: 18.49
      cash_advance_apr: 29.49
      balance_transfer_apr: null
      penalty_apr: null
      statement_end: 2026-04-17
      autopay_enabled: true
      next_autopay_amount: 1234.56
      cashback_balance: 42.50
      points_balance: null
      points_earned: null
      ytd_fees: 0.00
      ytd_interest: 0.00
      annual_fee: null

  # Defensive negative: an isolated "Available Credit" line must NOT be
  # misread as a cash-back-rewards balance. (cashback_balance_doesNotFalse
  # Positive_onAvailableCreditLine)
  - name: cashback-balance-no-false-positive-on-available-credit
    input: |
      Total Available Credit $1,234.56
    expected:
      cashback_balance: null

  # Some WF variants print the cash-back row without the "as of: DATE" suffix
  # ("Rewards balance $25.10"). The regex must still capture the amount.
  # (cashBackBalance_acceptsRewardsBalanceWithoutAsOfDate)
  - name: cashback-balance-no-as-of-date
    input: |
      Rewards balance $25.10
    expected:
      cashback_balance: 25.10

  # When the rewards-balance line is absent the field must be null, not zero.
  # (cashBackBalance_returnsNull_whenLineAbsent)
  - name: cashback-balance-absent-yields-null
    input: |
      New Balance $100
      Payment Due Date 05/01/26
    expected:
      cashback_balance: null

preprocessing:
  stitch:
    section_headers:
      - "Transactions"
      - "Payments"
      - "Purchases"
      - "Cash Advances"
      - "Fees Charged"
      - "Interest Charged"
      - "Rewards Summary"
      - "Cash Rewards Earned"

layouts:
  # WF single-date with amount at end:
  #   "11/27 SAFEWAY #1444 BELLEVUE WA $14.27"
  - name: wells-fargo-credit-single-date
    accountType: credit
    lineRegex: '^(?<date>\d{1,2}/\d{1,2}(?:/\d{2,4})?)\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*\.\d{2})\s*$'
    dateFormat: "M/d"
    signConvention: credit-positive
    minAmount: 0.01

# v2 transaction-shape declarations. Runs in shadow mode (parallel to legacy)
# via V2TransactionShadow on every import; production behavior is unchanged.
# Shadow logs PARITY/DELTA so we can iterate the shapes against the corpus
# without risk to existing reconciliation.
#
# WF statements have TWO transaction sections with different prefixes:
#  (1) Payments — date at start of line:
#      "04/12 04/12 F353100FN00CHGDDA AUTOMATIC PAYMENT - THANK YOU 545.91"
#  (2) Purchases — 4-digit card suffix BEFORE the date:
#      "6779 03/18 03/19 2494166EX8ASR99D0 REPUBLIC SERVICES ... 116.59"
# Both rows have transaction-date + posting-date + reference number +
# merchant + bare numeric amount (no $ sigil). Each shape captures `date`
# (transaction date), `description` (merchant + reference), `amount`.
transactions:
  - name: wells-fargo-payments
    line_regex: '^(?<date>\d{1,2}/\d{1,2})\s+\d{1,2}/\d{1,2}\s+\S+\s+(?<description>.+?)\s+(?<amount>-?\d{1,3}(?:,\d{3})*\.\d{2})\s*$'
    date_format: "M/d"
    account_type: credit
    sign_convention: credit-positive
    min_amount: 0.01
  - name: wells-fargo-purchases-with-card-suffix
    line_regex: '^\d{4}\s+(?<date>\d{1,2}/\d{1,2})\s+\d{1,2}/\d{1,2}\s+\S+\s+(?<description>.+?)\s+(?<amount>-?\d{1,3}(?:,\d{3})*\.\d{2})\s*$'
    date_format: "M/d"
    account_type: credit
    sign_convention: credit-positive
    min_amount: 0.01
