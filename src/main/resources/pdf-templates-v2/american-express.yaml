# American Express — Morgan Stanley Platinum (charge) + Blue Business Cash
# (credit), plus Platinum / Gold / Blue Cash where the same layout applies.
#
# Covers 19 statements in the corpus (mix of Morgan Stanley Platinum and
# Blue Business Cash). After PDFImportService.stitchContinuationLines runs,
# transactions in both flavours land on a single line:
#
#   - Morgan Stanley Platinum — terminated with a ⧫ marker, e.g.:
#       "04/19/26 GOOGLE *YOUTUBE MUSIC G.CO/HELPPAY# CA $18.74 ⧫"
#   - Blue Business Cash — no marker, e.g.:
#       "01/19/26 AplPay TST* OMO THAI TEA - NRO ... $19.71"
#
# The v2 `transactions:` block declares a single-line shape that matches both
# and reaches PARITY (count + sum) with the legacy Pattern 7 extractor on
# every Amex PDF in the corpus. See the comment above `transactions:` below
# for the regex breakdown.
#
# Status: unverified
id: amex-v2
institution: American Express
description: "American Express credit and charge cards"
status: unverified
extends: [common]

card_detection:
  institution_match:
    - any_of:
        - "(?i)americanexpress\\.com"
        - "(?i)American\\s+Express"
        - "(?i)\\bAMEX\\b"
        - "(?i)Make\\s+Check\\s+Payable\\s+to\\s+American\\s+Express"
        - "(?i)Morgan\\s+Stanley\\s+Platinum"

  # Amex prints account number as "Account Ending 8-41007" (an X-NNNNN form
  # where the leading single digit is a check digit, not part of the user-
  # visible last-4). We strip the hyphen and keep the last 4 of the digits.
  last_four:
    - pattern: "(?i)account\\s+ending\\s+(?:[\\d-]+)?(\\d{4})\\b"
      filename_fallback: true

  account_holder:
    - source: above_account_ending
      lines_above_account: 1-3

metadata:
  statement_date:
    - label: "Closing Date"
      adjacent: date

  # Amex doesn't use "Opening/Closing Date" — it prints period as separate
  # statement-date headers per page. Period extraction falls back to the
  # legacy code path for now (v2 fill-missing only).

  # Amex prints "New Balance $4,138.88" embedded in a long disclosure prose
  # line (the AutoPay block). We extract via explicit regex because our
  # label-adjacent rule skips lines >200 chars to avoid false-positive matches
  # against arbitrary prose.
  new_balance:
    - pattern: "(?i)New\\s+Balance\\s+\\$([\\d,]+\\.\\d{2})"

  # Amex statements have three label blocks: Account Summary (Pay-In-Full
  # subtotal, usually $0 for charge cards), Account Total (real values), and
  # then per-section "Total X for this Period" lines that print the same
  # values in summary form. The Total-X lines are the most reliable —
  # they're explicit, single-occurrence, and PDFBox extracts them as one
  # physical line with the value(s) inline.
  # Amex prints the consolidated "Account Total" block as a stacked layout in
  # PDFBox's default extraction: 6 label lines then 6 value lines. We address
  # the labels by index. The Pay-In-Full and Pay Over Time blocks above it
  # share the same label names but each has its own value stack — using
  # stacked_header anchors us to the right one.
  # Amex statements come in two flavours:
  #  (a) CHARGE cards (Platinum, Gold, MS Platinum) — 6-label "Account Total"
  #      block including "New Cash Advances".
  #  (b) CREDIT cards (Blue Cash, Blue Business, Delta, Hilton) — 5-label
  #      "Account Summary" block, no cash-advance row.
  # We try both stacked rules + the "Total X" inline summary patterns. First
  # rule that produces a value wins; the rules are ordered most-specific first.

  previous_balance:
    - stacked_header: "Account Total"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "New Cash Advances", "Fees", "Interest Charged"]
      stacked_index: 0
    - stacked_header: "Account Summary"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "Fees", "Interest Charged"]
      stacked_index: 0

  purchases_total:
    - stacked_header: "Account Total"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "New Cash Advances", "Fees", "Interest Charged"]
      stacked_index: 2
    - stacked_header: "Account Summary"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "Fees", "Interest Charged"]
      stacked_index: 2
    - pattern: "(?im)^\\s*Total\\s+New\\s+Charges\\s+\\$([\\d,]+\\.\\d{2})"

  payments_total:
    - stacked_header: "Account Total"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "New Cash Advances", "Fees", "Interest Charged"]
      stacked_index: 1
    - stacked_header: "Account Summary"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "Fees", "Interest Charged"]
      stacked_index: 1
    - pattern: "(?im)^\\s*Total\\s+Payments\\s+and\\s+Credits\\s+-?\\$([\\d,]+\\.\\d{2})"

  fees_total:
    - stacked_header: "Account Total"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "New Cash Advances", "Fees", "Interest Charged"]
      stacked_index: 4
    - stacked_header: "Account Summary"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "Fees", "Interest Charged"]
      stacked_index: 3
    - pattern: "(?im)^\\s*Total\\s+Fees\\s+for\\s+this\\s+Period\\s+\\$([\\d,]+\\.\\d{2})"

  interest_total:
    - stacked_header: "Account Total"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "New Cash Advances", "Fees", "Interest Charged"]
      stacked_index: 5
    - stacked_header: "Account Summary"
      stacked_labels: ["Previous Balance", "Payments/Credits", "New Charges", "Fees", "Interest Charged"]
      stacked_index: 4
    - pattern: "(?im)^\\s*Total\\s+Interest\\s+Charged\\s+for\\s+this\\s+Period\\s+\\$([\\d,]+\\.\\d{2})"

  # YTD fees / interest — Amex prints "Total Fees in 2026 $895.00" etc.
  ytd_fees:
    - pattern: "(?i)Total\\s+Fees\\s+in\\s+\\d{4}\\s+\\$([\\d,]+\\.\\d{2})"
  ytd_interest:
    - pattern: "(?i)Total\\s+Interest\\s+in\\s+\\d{4}\\s+\\$([\\d,]+\\.\\d{2})"

  # Credit limit layouts:
  #   - Charge cards (Platinum, Gold): "Pay Over Time Limit" stacked above
  #     "Available Pay Over Time Limit", two $-values below.
  #   - Credit cards (Blue Business Cash, etc.): "Credit Limit" stacked above
  #     either "Amount Above the Credit Limit" (over-limit) or "Available
  #     Credit" (within-limit), two $-values below.
  # The (?s) blocks tolerate blank lines between the labels and values.
  credit_limit:
    - pattern: "(?is)Pay\\s+Over\\s+Time\\s+Limit\\s*\\n+\\s*Available\\s+Pay\\s+Over\\s+Time\\s+Limit\\s*\\n+\\s*\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?is)Credit\\s+Limit\\s*\\n+\\s*(?:Amount\\s+Above\\s+the\\s+Credit\\s+Limit|Available\\s+Credit)\\s*\\n+\\s*\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?i)Pay\\s+Over\\s+Time\\s+Limit[:\\s]+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Credit\\s+Limit\\s+\\$([\\d,]+\\.\\d{2})"
  # Available credit: ONLY the within-limit form yields a real availableCredit
  # value. The over-limit form's second value is "amount above limit" — NOT
  # an available-credit value, so we leave it null and let downstream fall back
  # to max(0, limit - newBalance).
  available_credit:
    - pattern: "(?is)Pay\\s+Over\\s+Time\\s+Limit\\s*\\n+\\s*Available\\s+Pay\\s+Over\\s+Time\\s+Limit\\s*\\n+\\s*\\$[\\d,]+\\.\\d{2}\\s*\\n+\\s*\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?is)Credit\\s+Limit\\s*\\n+\\s*Available\\s+Credit\\s*\\n+\\s*\\$[\\d,]+\\.\\d{2}\\s*\\n+\\s*\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?i)Available\\s+Pay\\s+Over\\s+Time\\s+Limit[:\\s]+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?im)^\\s*Available\\s+Credit\\s+\\$([\\d,]+\\.\\d{2})"
  minimum_payment_due:
    - pattern: "(?i)Minimum\\s+Payment\\s+Due\\s+\\$([\\d,]+\\.\\d{2})"
  payment_due_date:
    - pattern: "(?i)Payment\\s+Due\\s+Date\\s+(\\d{1,2}/\\d{1,2}/\\d{2,4})"

  # APR table: "Pay Over Time 12/30/2022 19.49% (v)"
  purchase_apr:
    - pattern: "(?im)^\\s*Pay\\s+Over\\s+Time\\b.*?(\\d{1,2}\\.\\d{1,3})\\s*%"
    - pattern: "(?im)^\\s*Purchases\\b.*?(\\d{1,2}\\.\\d{1,3})\\s*%"
  cash_advance_apr:
    - pattern: "(?im)^\\s*Cash\\s+Advances?\\b.*?(\\d{1,2}\\.\\d{1,3})\\s*%"
  penalty_apr:
    - pattern: "(?i)Penalty\\s+APR(?:\\s+of)?\\s+(\\d{1,2}\\.\\d{1,3})\\s*%"

  # Membership Rewards points balance — 3-line block: heading, "Available and
  # Pending as of MM/DD/YY", integer. (?is) makes . span newlines.
  points_balance:
    - pattern: "(?is)Membership\\s+Rewards.{0,3}\\s+Points.*?Available\\s+and\\s+Pending\\s+as\\s+of\\s+\\d{1,2}/\\d{1,2}/\\d{2,4}\\s+(\\d{1,3}(?:,\\d{3})*|\\d+)"

  autopay_enabled:
    - label: "debit your bank account"
  next_autopay_amount:
    - pattern: "(?i)debit\\s+your\\s+bank\\s+account\\s+for\\s+your\\s+(?:monthly\\s+autopay\\s+)?payment\\s+of\\s+\\$([\\d,]+\\.\\d{2})"

  annual_fee:
    - pattern: "(?i)(?:ANNUAL\\s+MEMBERSHIP\\s+FEE|Annual\\s+Fee)\\s+\\$([\\d,]+\\.\\d{2})"
    - pattern: "(?i)annual\\s+membership\\s+fee\\s+in\\s+the\\s+amount\\s+of\\s+\\$([\\d,]+\\.\\d{2})"

  foreign_tx_fee_percent:
    - pattern: "(?i)[Ff]oreign\\s+[Tt]ransaction\\s+[Ff]ee[^%]*?(\\d{1,2}(?:\\.\\d{1,3})?)\\s*%"

  billing_days:
    - pattern: "(?i)Days?\\s+in\\s+Billing\\s+(?:Period|Cycle)[:\\s]+(\\d{1,3})"
    - pattern: "(?i)(?<!\\d)(\\d{1,3})\\s+Days?\\s+in\\s+Billing\\s+(?:Period|Cycle)"

# Family-card / authorized-user cardholder anchors.
# Amex Blue Business Cash (and other Amex multi-card products) prints a
# per-cardholder section header above each transaction block:
#  (a) Primary cardholder — single line:
#        "AGARWAL SUMIT KUMAR Account Ending 1-21002"
#      (also occurs as "<NAME> Closing Date <date> Account Ending <X-NNNNN>"
#      on the back-cover footer; same regex catches both.)
#  (b) Authorized-user cardholder — two lines:
#        "MUDIT AGARWAL"
#        "Card Ending 1-21010"
#      The first line is the bare name in all-caps; the second is the
#      card-ending marker.
#
# The "X-" prefix on Amex card-endings is a check digit and not part of the
# user-visible last 4. Each pattern strips it via "\\d+-?" before the
# captured 4-5 digit tail.
card_holders:
  # Primary-holder one-liner. The named groups (userName, cardLastFour) are
  # picked up by the extractor automatically. Amex prints the account number
  # as "Account Ending 1-21002" where "1" is a check digit and the
  # user-visible last-4 is the trailing 4 digits ("1002"); the
  # "\\d+-(?:\\d{0,2})(\\d{4})\\b" pattern eats the prefix + check digit so
  # cardLastFour captures exactly those 4 digits, matching the format used
  # by card_detection.last_four above.
  - pattern: "(?m)^\\s*(?<userName>[A-Z][A-Z]+(?:\\s+[A-Z][A-Z]+){1,4})\\s+(?:Closing\\s+Date\\s+\\d{1,2}/\\d{1,2}/\\d{2,4}\\s+)?Account\\s+Ending\\s+\\d+-(?:\\d{0,2})(?<cardLastFour>\\d{4})\\b.*$"
  # Authorized-user two-line block. The regex matches the "Card Ending" line;
  # the name comes from the immediately-previous non-blank line (the bare
  # all-caps name — DEFAULT_PREV_NAME_PATTERN in TransactionExtractor matches
  # 2-5 ALL-CAPS tokens).
  - pattern: "(?m)^\\s*Card\\s+Ending\\s+\\d+-(?:\\d{0,2})(?<cardLastFour>\\d{4})\\s*$"
    name_from_prev_line: true

preprocessing:
  fx_block_strip:
    - kind: amex-three-line
  stitch:
    end_of_transaction_marker: "⧫"
    section_headers:
      - "Detail"
      - "Detail Continued"
      - "Account Total"
      - "Account Summary"
      - "Pay In Full"
      - "Pay Over Time"
      - "New Charges"
      - "Payments/Credits"
      - "Fees"
      - "Interest Charged"
      - "Total Fees in"
      - "Total Interest in"

# v2 transaction-shape declarations — section-aware, validated against the
# 19-PDF Amex corpus. This is the source of truth when v2 cutover is enabled
# (see PDFImportService V2_TX_PRODUCTION_ISSUERS).
#
# Amex layouts in this corpus are post-stitch SINGLE-LINE (PDFImportService's
# stitchContinuationLines glues the legacy 3-line "date+desc / detail /
# amount" shape into one line). Two flavours coexist:
#  (1) Morgan Stanley Platinum (charge card): every transaction terminated
#      by a ⧫ marker:
#        "04/19/26 GOOGLE *YOUTUBE MUSIC G.CO/HELPPAY# CA $18.74 ⧫"
#  (2) Blue Business Cash (credit card): no ⧫ marker:
#        "01/19/26 AplPay TST* OMO THAI TEA - NRO ... $19.71"
# Foreign-currency rows carry the source currency inline before the USD
# amount; the description naturally absorbs it:
#   "04/13/26 BLUE SKY NARITA ... 1,925 Japanese Yen $12.07 ⧫"
#
# Amex statements organize transactions into named sections (matching the
# top-line headers Amex prints between Payment block and per-section detail):
#  (1) "Payments and Credits" — both autopay rows and refund/credit rows.
#      Every amount in this section is printed with a leading minus ("-$").
#      Sign: credit-card-credit (decreases card balance → CREDIT).
#      THIS is the section that breaks the audit when mis-classified — refunds
#      like "AMEX Airline Fee Reimbursement -$35.00" must NOT count as
#      purchases. The single-shape "credit-positive" predecessor mapped every
#      row to CREDIT_CARD_PURCHASE and inverted to DEBIT, producing $980+
#      deltas on Morgan Stanley statements with large refund/credit totals.
#  (2) "New Charges" — purchases. Amounts printed without minus sign.
#      Sign: credit-card-purchase (debits).
#
# Both shapes share the same line_regex (the layout is identical, only the
# section header differs). The trailing-text guard `(?:\s+[^$\n]*)?$` permits
# stray card-name suffix that PDFBox occasionally appends ("$31.94 American
# Express Blue Business Cashº AGARWAL SUMIT KUMAR ...") while still rejecting
# the AutoPay-disclosure prose line that begins with a date and contains
# MULTIPLE $-figures.
transactions:
  - name: amex-payments-credits
    section_anchor: "Payments and Credits"
    # Optional FX block inline before the USD amount. When stitching glues
    # the Amex 3-line FX block into the parent tx line, the parent looks like
    # "04/13/26 BLUE SKY NARITA ... 1,925 Japanese Yen $12.07 ⧫". The
    # `(?:\s+(?<fxOrigAmount>...)\s+(?<fxOrigCode>...))?` segment is
    # optional — non-FX rows match exactly as before. The currency-name
    # alternation covers every display name in Amex's CURRENCY_DISPLAY_TO_CODE
    # plus the singular/plural variants Amex actually emits.
    line_regex: '^(?<date>\d{1,2}/\d{1,2}/\d{2,4})\*?\s+(?<description>.+?)(?:\s+(?<fxOrigAmount>[\d,]+(?:\.\d{1,4})?)\s+(?<fxOrigCode>(?:Japanese\s+Yen|Indian\s+Rupees?|Mexican\s+Pesos?|Canadian\s+Dollars?|Australian\s+Dollars?|Singapore\s+Dollars?|Hong\s+Kong\s+Dollars?|New\s+Taiwan\s+Dollars?|British\s+Pounds?|Pounds?\s+Sterling|Chinese\s+(?:Yuan|Renminbi)|Korean\s+Won|Thai\s+Baht|Swiss\s+Francs?|Brazilian\s+Reals?|South\s+African\s+Rands?|Moroccan\s+Dirhams?|UAE\s+Dirhams?|Euros?|Danish\s+Krone|Swedish\s+Krona|Norwegian\s+Krone)))?\s+(?<amount>-?\$[\d,]+\.\d{2})\s*⧫?(?:\s+[^$\n]*)?\s*$'
    date_format: "M/d/yy"
    account_type: credit
    sign_convention: credit-card-credit
    min_amount: 0.01
    strip_lines_matching:
      - "^\\d{1,2}/\\d{1,2}/\\d{2,4}\\s+New\\s+Balance\\s+\\$"
  - name: amex-new-charges
    section_anchor: "New Charges"
    line_regex: '^(?<date>\d{1,2}/\d{1,2}/\d{2,4})\*?\s+(?<description>.+?)(?:\s+(?<fxOrigAmount>[\d,]+(?:\.\d{1,4})?)\s+(?<fxOrigCode>(?:Japanese\s+Yen|Indian\s+Rupees?|Mexican\s+Pesos?|Canadian\s+Dollars?|Australian\s+Dollars?|Singapore\s+Dollars?|Hong\s+Kong\s+Dollars?|New\s+Taiwan\s+Dollars?|British\s+Pounds?|Pounds?\s+Sterling|Chinese\s+(?:Yuan|Renminbi)|Korean\s+Won|Thai\s+Baht|Swiss\s+Francs?|Brazilian\s+Reals?|South\s+African\s+Rands?|Moroccan\s+Dirhams?|UAE\s+Dirhams?|Euros?|Danish\s+Krone|Swedish\s+Krona|Norwegian\s+Krone)))?\s+(?<amount>-?\$[\d,]+\.\d{2})\s*⧫?(?:\s+[^$\n]*)?\s*$'
    date_format: "M/d/yy"
    account_type: credit
    sign_convention: credit-card-purchase
    min_amount: 0.01
    strip_lines_matching:
      - "^\\d{1,2}/\\d{1,2}/\\d{2,4}\\s+New\\s+Balance\\s+\\$"
    # Amex FX detail can also arrive AFTER the tx line as a separate Exchange
    # Rate / Commission disclosure (less common but observed on some Platinum
    # variants). When present, capture rate via the post-tx scan.
    fx_lines:
      - '(?i)^\s*Exchange\s+Rate\s+(?<fxRate>\d+\.\d+)'
      - '(?i)^\s*Commission\s+(?<fxRate>\d+\.\d+)'

layouts:
  # Compact single-line (Morgan Stanley Platinum + some MS variants):
  #   "12/19/25 GOOGLE *YOUTUBE MUSIC G.CO/HELPPAY# CA $18.72 ⧫"
  - name: amex-compact-single-line
    accountType: credit
    lineRegex: '^(?<date>\d{1,2}/\d{1,2}/\d{2,4})\*?\s+(?<description>.+?)\s+\$?(?<amount>-?\d{1,3}(?:,\d{3})*\.\d{2})\s*⧫?\s*$'
    dateFormat: "M/d/yy"
    signConvention: credit-positive
    minAmount: 0.01

  # Amex "Reward Bonus" mid-line +$N.NN with date BEFORE the bonus rows:
  #   "5% Cashback Bonus +$2.10 10/14 AMZN MKTP US"
  - name: amex-reward-prefix
    accountType: credit
    lineRegex: '^.+?\+\$(?<amount>\d{1,3}(?:,\d{3})*\.\d{2}).*?(?<date>\d{1,2}/\d{1,2}/\d{2,4})\b(?<description>.*)$'
    dateFormat: "M/d/yy"
    signConvention: credit-positive
    minAmount: 0.01
