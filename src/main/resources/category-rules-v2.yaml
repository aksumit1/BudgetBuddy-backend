# Category rules engine — declarative source of truth for merchant→category.
#
# Schema:
#   rules:
#     - category: <category>     # must match TransactionCategory constants
#       priority: <int>          # higher wins; ties break by file order
#       mode: word | contains    # word = whole-word, contains = substring
#       keywords: [...]          # lowercase tokens
#
# Priority tiers (higher → earlier dispatch):
#   1000 — explicit payment/fee patterns (must win over generic merchants)
#    950 — strong context-sensitive overrides (Costco Gas vs Costco WHSE)
#    900 — unambiguous strong brand catches (PayPal, Coinbase, Geico)
#    850 — brand-tied location patterns
#    800 — major multi-word brand names (Whole Foods, In-N-Out)
#    700 — single-word brand tokens (Chipotle, Starbucks) — word mode
#    600 — domain keywords (kitchen, cafe, hotel, sushi)
#    500 — POS prefixes (TST*, SQ*, RBL*)
#    400 — long-tail / niche brands
#    300 — generic merchant-category descriptors
#
# Coverage scope: US + UK + EU + India + East Asia + LatAm major chains.
# Adding/correcting a merchant is a YAML edit; no recompile required.

rules:
  # =================================================================
  # FEES (highest priority — must beat brand-tied rules)
  # =================================================================
  - category: fees
    priority: 1000
    mode: contains
    keywords:
      - "foreign transaction fee"
      - "returned payment fee"
      - "late fee"
      - "overlimit fee"
      - "over limit fee"
      - "balance transfer fee"
      - "cash advance fee"
      - "annual membership fee"
      - "annual fee"
      - "service fee"
      - "membership rewards"
      - "wire transfer fee"
      - "overdraft fee"
      - "atm fee"
      - "stop payment fee"
      - "convenience fee"
      - "processing fee"
      - "transaction fee"
      - "currency conversion fee"
      - "dispute fee"
      - "rush delivery fee"
      - "expedited fee"

