# =====================================================================
# Draft category rules from LLM batch-backfill (Claude Code, hand-classified)
# Source: 326 unique merchant clusters from 1126 cascade-misses across 170 PDFs
# This file is a REVIEW DRAFT — review and merge into category-rules-v2.yaml.
#
# Coverage of this draft: top 70 clusters covering ~800 of the 1126 misses (~71%).
# Skipped (intentional): genuine transfers, deposits, checks, generic "withdrawal"
# rows — these aren't merchant transactions and shouldn't have a merchant category.
# =====================================================================

rules:

  # =================================================================
  # PAYMENT — priority 1000
  # NARROW DEFINITION: CC-statement-side credit lines. These appear when
  # the card issuer settles the user's CC debt — the bill itself going to
  # zero. They are NEUTRAL for budget analytics: they don't represent new
  # spending nor income, just settlement of existing debt. The matching
  # outflow on the user's checking account is categorised separately as
  # `transfer` (see below) so we don't double-count.
  # =================================================================
  - category: payment
    priority: 1000
    mode: contains
    keywords:
      # CC-statement "thank you" strings — all card issuers use these on
      # the credit-card side (FlowDirection.CREDIT on a credit-card account).
      - "automatic payment - thank you"
      - "automatic payment-thank you"
      - "mobile payment - thank you"
      - "online payment - thank you"
      - "et payment   thank you"
      - "mtc payment   thank you"
      - "ach payment - thank you"
      - "payment - thank you"
      - "payment-thank you"
      - "autopay payment received"
      - "directpay full balance"
      - "internet payment thank you"  # flipped from interest; CC online-portal pay

  # =================================================================
  # TRANSFER — priority 1000
  # CC-payment OUTFLOW from a bank account (the user pulling money from
  # checking to pay the CC issuer). On the bank-statement side, these are
  # FlowDirection.DEBIT but they are NOT merchant spend — they're the
  # cash-flow side of the issuer settlement above. Budget analytics should:
  #   • surface these as a "transfer" line in cash-flow views
  #   • exclude them from "merchant spend by category" totals
  # Keeping payment and transfer distinct lets the UI/insights layer
  # decide how to present each without losing information.
  # =================================================================
  - category: transfer
    priority: 1000
    mode: contains
    keywords:
      # Card-issuer autopay pulls from checking
      - "citi autopay"
      - "chase credit crd autopay"
      - "wf credit card   auto pay"
      - "wf credit card"
      - "discover         e-payment"
      - "amex ach pmt"
      - "american express ach pmt"
      - "american express retry pymt"
      - "cardmember serv  web pymt"
      - "target card srvc payment"
      - "amz_storecrd_pmt payment"
      - "autopay auto-pmt"
      - "payment to chase card"
      # PayPal credit-card repayment
      - "paypal           inst xfer  ppcr cc repayme"
      - "ppcr cc repayme"
      # Inter-account transfers visible in the still-missing list
      - "online transfer to chk"
      - "online transfer from chk"
      - "online transfer to sav"
      - "online transfer from sav"
      - "online transfer from morganstanley"
      - "online transfer 2"  # numeric-prefixed Chase transfer IDs
      - "first tech fcu   extrnltfr"
      - "first tech fcu extrnltfr"
      - "jpmorgan chase   chase ach"
      - "jpmorgan chase chase ach"
      - "pc bellevue      pcb ach"
      - "pc bellevue pcb ach"
      - "morgan stanley   ach debit"
      - "morgan stanley ach debit"
      # International remittance
      - "remitly united s payments"
      - "rmtly* "
      - "xoom             debit"
      - "xoom debit"

  # =================================================================
  # INCOME — priority 1000
  # NOT an expense category. These are money-IN flows on the checking
  # account (FlowDirection.CREDIT on a debit/checking account). Distinct
  # from `transfer` (which is movement between the user's own accounts)
  # and from `payment` (which is CC-debt settlement). Subdivided into
  # specific income types so the UI can break down "where did your
  # income come from" without lumping rent + salary + dividends.
  # =================================================================
  - category: salary
    priority: 1000
    mode: contains
    keywords:
      # Employer payroll Direct Deposit. Each employer's ACH descriptor is
      # slightly different (spacing, casing, "Svcs" vs "Services" vs "Pay")
      # so we list common shapes seen in this dataset plus generic catches.
      # Note: priority 1000 BEATS v2's "amazon"/"amazon.com" shopping rules
      # (priority 700) so an "Amazon.Com Svcs Direct Dep" line lands here,
      # not in shopping.
      - "amazon.com svcs  direct dep"   # double space (Chase Checking export)
      - "amazon.com svcs direct dep"    # single space (other issuers)
      - "amazon.com payments  direct dep"
      - "amazon.com payments direct dep"
      - "amazon.com services direct dep"
      - "amazon  direct dep"
      - "amazon direct dep"
      # Generic payroll catches — match the descriptor pattern. Use specific
      # 2-token phrases ("payroll direct dep") rather than the single word
      # "payroll" or "direct dep" alone, which would over-match.
      - "payroll direct dep"
      - "payroll direct deposit"
      - "direct dep payroll"
      - "ach direct dep payroll"
      - "salary"
      - "salary credit"
      - "salary deposit"
      - "wages"
      # Common payroll-processor descriptors
      - "adp payroll"
      - "gusto pay"
      - "paychex"
      - "rippling"
      - "trinet"
      - "workday "

  - category: rent
    priority: 1000
    mode: contains
    keywords:
      # Rental income from a property management ACH
      - "grisalin managem sigonfile"
      - "grisalin managem"

  - category: dividend
    priority: 1000
    mode: contains
    keywords:
      # Investment account ACH credit (Morgan Stanley etc.).
      # ACH DEBIT from the same account is a transfer (money out to
      # checking is just moving cash; the income realisation is the
      # credit side).
      - "morgan stanley   ach credit"
      - "morgan stanley ach credit"

  - category: income
    priority: 1000
    mode: contains
    keywords:
      # Generic incoming money that doesn't fit salary/rent/dividend.
      # Real Time Payment (RTP) credits, generic Deposit rows.
      - "real time payment credit recd"

  - category: deposit
    priority: 950
    mode: word
    keywords:
      # Bank's catch-all "Deposit" row when no specific source is given.
      # Match as word so we don't catch substrings like "DEPOSIT TICKET".
      - "deposit"

  # =================================================================
  # CHECK — priority 950
  # Paper checks issued from a checking account. The PDF shows them as
  # `Check                         # 170`. No merchant identity attached;
  # treat them as an expense bucket separate from merchant categories so
  # the UI can distinguish "money paid via paper check" from "money paid
  # at a specific merchant".
  # =================================================================
  - category: check
    priority: 950
    mode: contains
    keywords:
      - "check                         #"
      - "check                          #"
      # Single-space variant — appears in some Chase Checking exports.
      # Anchor with "check #" + numeric to avoid spurious matches on
      # merchant names that happen to contain "check #".
      - "check # 1"
      - "check # 2"
      - "check # 3"
      - "check # 4"
      - "check # 5"
      - "check # 6"
      - "check # 7"
      - "check # 8"
      - "check # 9"

  # =================================================================
  # CASH — priority 900
  # Generic ATM / cash withdrawals. "Withdrawal" with no other token is
  # the bank's catch-all for over-the-counter and ATM cash. Match as a
  # word so we don't catch substrings like "WITHDRAWALS" in a section
  # header.
  # =================================================================
  - category: cash
    priority: 900
    mode: word
    keywords:
      - "withdrawal"
      - "atm withdrawal"

  # =================================================================
  # REFUND — priority 900
  # Credit-card rewards credits, statement credits, airline-fee
  # reimbursements, cash-rebate transactions. Distinct from `payment`
  # (which is debt settlement) and from `income` (which is wages /
  # external deposits): these are spending offsets the issuer applies
  # to the user's statement.
  # =================================================================
  - category: refund
    priority: 900
    mode: contains
    keywords:
      - "cash reward/refund"
      - "your cash reward/refund"
      - "cash rebate transaction"
      - "fee reimbursement"
      - "airline fee reimbursement"
      - "statement credit bonus"
      - "platinum digital entertainment credit"
      - "amex offer credit"
      - "offer 04 moved to standard purch"
      - "offer 04 promotional apr ended"

  # =================================================================
  # FEES (taxes, interest, wire fees, government services) — priority 950
  # =================================================================
  - category: fees
    priority: 950
    mode: contains
    keywords:
      - "consumer usd international wire fee"
      - "consumer online usd intl wire fee"
      - "consumer usd international wire"
      - "consumer international wire"
      - "consumer online international wire"
      - "interest charge on purchases"
      - "interest charge on cash"
      - "irs              usataxpymt"
      - "irs usataxpymt"
      - "us treas tax pymt"
