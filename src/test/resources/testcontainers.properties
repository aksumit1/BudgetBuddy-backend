# Testcontainers local config. Works around Docker Desktop 4.40+ / engine
# 29.4+ returning Status 400 on /info during Testcontainers' strategy
# discovery by pinning the strategy (skips the /info probe race) and
# pointing directly at the Docker Desktop socket.
#
# Why this file is needed: docker-java (bundled with Testcontainers 1.21)
# expects a 200 from Docker's /info endpoint; Docker Desktop 29.4 returns
# 400 with an empty-shell payload during/after warmup, so Testcontainers'
# auto-detection throws "Could not find a valid Docker environment"
# even though CLI `docker run` works fine.
#
# If you're on a different Docker runtime (Colima, OrbStack, Rancher),
# either delete this file or point docker.host at your socket.
docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy
docker.host=unix:///var/run/docker.sock

# Disable Ryuk (cleanup sidecar) because it can hit the same /info probe
# issue at startup. Stale containers from cancelled test runs will be
# cleaned up by docker-compose or manual `docker ps -aq | xargs docker rm`.
ryuk.disabled=true

# Enable reuse so LocalStack isn't recreated between test classes in a
# single mvn test run. Major speedup, and the default test data is cleaned
# per-test anyway.
testcontainers.reuse.enable=true
