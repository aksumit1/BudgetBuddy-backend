name: PDF Import patch proposer

# Nightly job that runs the LLM patch proposer against captured diagnostic
# blobs. Opens individual PRs per (institution, strategy) so a human can
# review the proposed YAML / regex patches.
#
# This workflow does NOT auto-merge — it only proposes. A reviewer must
# confirm the patch closes the diagnostic without regressing the corpus
# audit.

on:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC daily
  workflow_dispatch:        # manual run
    inputs:
      dry_run:
        description: 'Only print prompts, do not call the API'
        type: boolean
        default: false

jobs:
  propose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Sync diagnostics from S3
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          PDF_DIAGNOSTICS_BUCKET: ${{ secrets.PDF_DIAGNOSTICS_BUCKET }}
        run: |
          mkdir -p /tmp/pdf-diagnostics
          aws s3 sync "s3://$PDF_DIAGNOSTICS_BUCKET/pdf-diagnostics/" \
              /tmp/pdf-diagnostics/ \
              --exclude '*.patch_proposal.md'

      - name: Run patch proposer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-opus-4-5
          PDF_DIAGNOSTICS_DIR: /tmp/pdf-diagnostics
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: ./scripts/run-patch-proposer.sh

      - name: Run audit harness against proposed patches
        if: ${{ !inputs.dry_run }}
        run: |
          # Verify the 42-PDF corpus still reconciles after any applied patches.
          mvn -q test -Dtest='PdfFullAuditTest' \
              -Dpdf.audit.dir=/tmp/audit-pdfs

      - name: Upload proposals
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-proposals
          path: /tmp/pdf-diagnostics/**/*.patch_proposal.md
