AWSTemplateFormatVersion: '2010-09-09'
Description: 'BudgetBuddy Backend - AWS Secrets Manager Secrets'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
    Description: Deployment environment

Resources:
  # Customer-managed KMS key used to encrypt every secret in this stack.
  # Closes Checkov CKV_AWS_149 (each AWS::SecretsManager::Secret must be
  # encrypted with a CMK rather than the AWS-managed aws/secretsmanager key)
  # and gives us per-key rotation + IAM control we don't get on the default.
  SecretsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub 'CMK for budgetbuddy/${Environment} Secrets Manager secrets'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowSecretsManagerService
            Effect: Allow
            Principal:
              Service: secretsmanager.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: budgetbuddy-backend
        - Key: ManagedBy
          Value: CloudFormation

  SecretsKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/budgetbuddy/${Environment}/secrets'
      TargetKeyId: !Ref SecretsKMSKey

  # JWT Secret
  JWTSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'budgetbuddy/${Environment}/jwt-secret'
      Description: JWT signing secret for authentication tokens
      KmsKeyId: !Ref SecretsKMSKey
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: 'jwtSecret'
        PasswordLength: 64
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: budgetbuddy-backend
        - Key: ManagedBy
          Value: CloudFormation

  # Plaid Secrets
  PlaidSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'budgetbuddy/${Environment}/plaid'
      Description: Plaid API credentials (clientId, secret, environment)
      KmsKeyId: !Ref SecretsKMSKey
      SecretString: !Sub |
        {
          "clientId": "",
          "secret": "",
          "environment": "sandbox"
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: budgetbuddy-backend
        - Key: ManagedBy
          Value: CloudFormation

  # Stripe Secrets
  StripeSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'budgetbuddy/${Environment}/stripe'
      Description: Stripe API credentials (secretKey, publishableKey)
      KmsKeyId: !Ref SecretsKMSKey
      SecretString: !Sub |
        {
          "secretKey": "",
          "publishableKey": ""
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: budgetbuddy-backend
        - Key: ManagedBy
          Value: CloudFormation

  # Database Configuration (for reference, if needed)
  DatabaseConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'budgetbuddy/${Environment}/database'
      Description: Database configuration (endpoint, port, etc.)
      KmsKeyId: !Ref SecretsKMSKey
      SecretString: !Sub |
        {
          "endpoint": "",
          "port": "5432",
          "database": "budgetbuddy"
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: budgetbuddy-backend
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  JWTSecretArn:
    Description: ARN of the JWT secret
    Value: !Ref JWTSecret
    Export:
      Name: !Sub '${AWS::StackName}-JWTSecretArn'

  PlaidSecretArn:
    Description: ARN of the Plaid secret
    Value: !Ref PlaidSecret
    Export:
      Name: !Sub '${AWS::StackName}-PlaidSecretArn'

  StripeSecretArn:
    Description: ARN of the Stripe secret
    Value: !Ref StripeSecret
    Export:
      Name: !Sub '${AWS::StackName}-StripeSecretArn'

  SecretsKMSKeyArn:
    Description: ARN of the customer-managed KMS key encrypting all secrets
    Value: !GetAtt SecretsKMSKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SecretsKMSKeyArn'
