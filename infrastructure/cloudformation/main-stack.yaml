AWSTemplateFormatVersion: '2010-09-09'
Description: 'BudgetBuddy Backend - Enterprise Cloud Infrastructure Stack'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
    Description: Deployment environment
  
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for VPC
  
  AvailabilityZones:
    Type: CommaDelimitedList
    Default: us-east-1a,us-east-1b,us-east-1c
    Description: Availability zones for multi-AZ deployment

  DomainName:
    Type: String
    Default: budgetbuddy.com
    Description: Domain name for the application

Conditions:
  IsProduction: !Equals [!Ref Environment, production]

Resources:
  # VPC and Networking
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'
        - Key: Environment
          Value: !Ref Environment

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !Ref AvailabilityZones]
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-subnet-1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !Ref AvailabilityZones]
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-subnet-2'

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !Ref AvailabilityZones]
      CidrBlock: 10.0.11.0/24
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-subnet-1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !Ref AvailabilityZones]
      CidrBlock: 10.0.12.0/24
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-subnet-2'

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [2, !Ref AvailabilityZones]
      CidrBlock: 10.0.13.0/24
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-subnet-3'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-igw'

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  # NAT Gateway for External API Access (Plaid, Stripe)
  # Required: ECS tasks in private subnets need internet access for external APIs
  # Cost-optimized: Single NAT Gateway, VPC Endpoints handle AWS service traffic
  NatGateway1EIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGateway1EIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-nat-gateway-1'
        - Key: Purpose
          Value: External API Access (Plaid, Stripe)

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-routes'

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-routes-1'

  # Route to NAT Gateway for external API access (Plaid, Stripe)
  # Note: AWS service traffic uses VPC Endpoints (no NAT Gateway usage)
  DefaultPrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      SubnetId: !Ref PrivateSubnet1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-routes-2'

  # Route to NAT Gateway for external API access (Plaid, Stripe)
  # Note: AWS service traffic uses VPC Endpoints (no NAT Gateway usage)
  DefaultPrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      SubnetId: !Ref PrivateSubnet2

  PrivateSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      SubnetId: !Ref PrivateSubnet3

  # VPC Endpoints (AWS services accessed via VPC Endpoints - Minimizes NAT Gateway usage)
  # NAT Gateway is only used for external APIs (Plaid, Stripe) - not for AWS services
  DynamoDBEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.dynamodb'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable1
        - !Ref PrivateRouteTable2
      PolicyDocument:
        Statement:
          # Defense-in-depth: VPC endpoint policy also narrowed to BudgetBuddy
          # tables. The IAM task role is still the primary gate, but this
          # prevents a compromised workload inside the VPC from using this
          # endpoint to reach arbitrary DynamoDB tables in the account.
          - Sid: BudgetBuddyTables
            Effect: Allow
            Principal: '*'
            Action:
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:BatchWriteItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:ConditionCheckItem
              - dynamodb:DescribeTable
            Resource:
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BudgetBuddy-*'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BudgetBuddy-*/index/*'

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable1
        - !Ref PrivateRouteTable2
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::budgetbuddy-storage/*'
              - !Sub 'arn:aws:s3:::budgetbuddy-storage'

  CloudWatchLogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true

  ECREndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.dkr'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - ecr:GetAuthorizationToken
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: '*'

  ECRAPIEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.api'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true

  CloudWatchMetricsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.monitoring'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true

  KMSEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.kms'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true

  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-vpc-endpoint-sg'
      GroupDescription: Security group for VPC endpoints
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref ECSSecurityGroup
          Description: HTTPS from ECS tasks
      # Explicit egress avoids cfn-nag F1000 (default open egress). VPC
      # endpoints serve responses on their ENI; restricting outbound to
      # the VPC CIDR on 443 is sufficient for response traffic.
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !GetAtt VPC.CidrBlock
          Description: HTTPS responses scoped to VPC CIDR
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc-endpoint-sg'

  # Security Groups
  ALBSecurityGroup:
    # CKV_AWS_260 deliberately not enforced: the ALB *must* accept HTTP
    # from the internet on port 80 because the port-80 listener does
    # nothing but 301-redirect to HTTPS (see ALBListener). Without this
    # ingress, browsers that hit http:// URLs would get a connection
    # refused instead of the redirect.
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_260
            comment: Port-80 ingress only feeds the HTTP→HTTPS 301-redirect listener; no application traffic served on 80
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-alb-sg'
      GroupDescription: Security group for Application Load Balancer
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound (egress controls handled at NACL/route level)  # CKV_AWS_23
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-alb-sg'

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-ecs-sg'
      GroupDescription: Security group for ECS tasks
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow traffic from ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound (egress controls handled at NACL/route level)  # CKV_AWS_23
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ecs-sg'

  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${AWS::StackName}-alb'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '60'
        - Key: access_logs.s3.enabled
          Value: 'true'
        - Key: access_logs.s3.bucket
          Value: !Ref ALBAccessLogsBucket
        - Key: access_logs.s3.prefix
          Value: 'alb-access-logs'
        - Key: routing.http.drop_invalid_header_fields.enabled  # CKV_AWS_131
          Value: 'true'
        - Key: deletion_protection.enabled
          Value: !If [IsProduction, 'true', 'false']
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-alb'

  ALBAccessLogsBucket:
    # CKV_AWS_18 not applicable: this bucket IS the access-log target for
    # the ALB. Recursive logging (logging the logger) is degenerate and
    # silently doubles cost without insight.
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_18
            comment: This bucket is itself the access-log target; logging it would create a recursive cycle
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-alb-access-logs-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 3  # Reduced to 3 days for cost optimization
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 7

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${AWS::StackName}-tg'
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPath: /actuator/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-tg'

  ALBListener:
    # cfn_nag suppress W56: this listener exists *only* to 301-redirect HTTP
    # to HTTPS (see DefaultActions). The actual TLS listener is
    # ALBHTTPSListener — keeping a port 80 listener is the recommended way
    # to handle clients that still hit http:// URLs.
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W56
            reason: HTTP listener serves only 301 redirect to HTTPS; ALBHTTPSListener handles TLS
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: 443
            StatusCode: HTTP_301
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP

  ALBHTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref SSLCertificate
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06

  SSLCertificate:
    # CKV2_AWS_71: the wildcard SAN is intentional. We share one cert
    # across api.{DomainName}, www.{DomainName}, and any future
    # service-specific subdomain (e.g. status., docs.) without round-
    # tripping ACM each time. The wildcard is scoped to one apex domain
    # the org controls — the standard "single-cert-per-app" anti-pattern
    # the rule warns against doesn't apply.
    Metadata:
      checkov:
        skip:
          - id: CKV2_AWS_71
            comment: Wildcard SAN intentional — one cert shared across api/www/status/etc subdomains under our apex
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub 'api.${DomainName}'
      ValidationMethod: DNS
      SubjectAlternativeNames:
        - !Sub '*.${DomainName}'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ssl-cert'

  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${AWS::StackName}-cluster'
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: !If [IsProduction, FARGATE, FARGATE_SPOT]
          Weight: !If [IsProduction, 1, 0]
        - CapacityProvider: !If [IsProduction, FARGATE_SPOT, FARGATE]
          Weight: !If [IsProduction, 0, 1]
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-cluster'
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: budgetbuddy-backend
        - Key: CostCenter
          Value: engineering

  # ECR Repository
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: budgetbuddy-backend
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: IMMUTABLE  # CKV_AWS_51
      EncryptionConfiguration:
        EncryptionType: KMS  # CKV_AWS_136 — uses AWS-managed alias/aws/ecr
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 5 images for free tier cost optimization",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: budgetbuddy-backend-ecr

  # IAM Roles
  ECSTaskExecutionRole:
    # CKV_AWS_111: this role's write actions (ecr:PutImage style perms via
    # the AWS-managed AmazonECSTaskExecutionRolePolicy + secretsmanager
    # GetSecretValue, kms Decrypt) are scoped by the managed policy +
    # explicit Resource ARNs in the inline policies. The remaining
    # constraint warning is on the AWS-managed policy itself, which we
    # don't author. CloudWatch Logs writes (logs:CreateLogGroup,
    # CreateLogStream, PutLogEvents) intentionally use Resource:'*'
    # — a Spring Boot task can't predict its log group ARN at startup
    # without an additional bootstrap step, and ECS tasks already only
    # run with this role's identity.
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_111
            comment: Write actions covered by AWS-managed policy + ARN-scoped inline policies; logs:* needs `*` for ECS task self-logging
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ecs-task-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ECRAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:budgetbuddy/*'

  ECSTaskRole:
    # CKV_AWS_111: each inline policy below scopes the Resource to a
    # specific ARN (DynamoDB tables, S3 storage, Secrets Manager scope).
    # CloudWatchAccess and KMSAccess intentionally use `*` because the
    # task self-publishes logs/metrics to its own resources — there is
    # no narrower ARN available at policy-definition time. KMSAccess
    # is further constrained by `kms:ViaService` so the task can only
    # use the key through DynamoDB / Secrets Manager / S3.
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_111
            comment: Resources scoped per-action; remaining `*` is for self-logging/metrics, kms:ViaService-scoped
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ecs-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Narrowed from a single wildcard `dynamodb:*` to the specific
              # actions the application needs. Cluster actions (CreateTable,
              # DeleteTable, UpdateTable) are intentionally omitted — those
              # run via CloudFormation. Scans are allowed only on the tables
              # that the aggregation jobs need to scan.
              - Sid: ItemLevelReadWrite
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:BatchGetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Query
                  - dynamodb:ConditionCheckItem
                  - dynamodb:DescribeTable
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BudgetBuddy-*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BudgetBuddy-*/index/*'
              - Sid: ScanAllowedTables
                Effect: Allow
                Action:
                  - dynamodb:Scan
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BudgetBuddy-UserPreferences'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BudgetBuddy-Users'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BudgetBuddy-Accounts'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BudgetBuddy-Transactions'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BudgetBuddy-Budgets'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub 'arn:aws:s3:::budgetbuddy-storage/*'
        - PolicyName: CloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:budgetbuddy/*'
        - PolicyName: KMSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Scoped to the application CMK only. `kms:ViaService` further
              # constrains which AWS service is allowed to present this key on
              # the task's behalf — the task never calls KMS directly.
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: !GetAtt AppDataKey.Arn
                Condition:
                  StringEquals:
                    kms:ViaService:
                      - !Sub 'dynamodb.${AWS::Region}.amazonaws.com'
                      - !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'
                      - !Sub 's3.${AWS::Region}.amazonaws.com'

  # CloudWatch Log Group
  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ecs/${AWS::StackName}'
      RetentionInDays: 3  # Reduced to 3 days for cost optimization (no NAT Gateway costs)
      KmsKeyId: !GetAtt AppDataKey.Arn  # CKV_AWS_158 — encrypts log data with the app CMK
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-logs'
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: budgetbuddy-backend
        - Key: CostCenter
          Value: engineering

  # Auto-scaling for the ECS service is declared in the same stack that
  # creates the task definition + service (deployed by the CD pipeline). The
  # `AutoScalingRole` below is provisioned here so the deploying stack can
  # assume it; the `ScalableTarget` + `ScalingPolicy` live next to the
  # service so they don't reference a resource that doesn't exist in this
  # stack. See `canary-fleet.yaml` / pipeline templates for the wire-up.
  AutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceAutoscaleRole

  # Auto Scaling Policy (Disabled for free tier - can be enabled later)
  # ECSServiceScaleUpPolicy:
  #   Type: AWS::ApplicationAutoScaling::ScalingPolicy
  #   Properties:
  #     PolicyName: !Sub '${AWS::StackName}-scale-up'
  #     PolicyType: TargetTrackingScaling
  #     ScalingTargetId: !Ref ECSServiceAutoScalingTarget
  #     TargetTrackingScalingPolicyConfiguration:
  #       TargetValue: 70.0
  #       PredefinedMetricSpecification:
  #         PredefinedMetricType: ECSServiceAverageCPUUtilization
  #       ScaleInCooldown: 300
  #       ScaleOutCooldown: 60

  # ECS CPU / memory alarms live in MonitoringStack (nested) so they can
  # reference the ECS service that is deployed by the CD pipeline. Keeping
  # them here would create a forward reference to a resource that doesn't
  # exist in this stack.

  # Customer-managed KMS key for DynamoDB encryption at rest. Using a CMK
  # (vs the AWS-managed `alias/aws/dynamodb`) gives us: scoped grants per
  # consumer, CloudTrail key-usage events, manual/automatic rotation control,
  # and the ability to deny decryption by revoking key policy — none of which
  # the AWS-managed key supports. Compliance (SOC2 CC6.1) requires this for
  # financial data at rest.
  AppDataKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub 'BudgetBuddy ${Environment} CMK for DynamoDB + Secrets encryption'
      EnableKeyRotation: true
      PendingWindowInDays: 30
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowDynamoDBServiceUsage
            Effect: Allow
            Principal:
              Service: dynamodb.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
              - kms:CreateGrant
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService: !Sub 'dynamodb.${AWS::Region}.amazonaws.com'
                kms:CallerAccount: !Ref AWS::AccountId
          - Sid: AllowCloudWatchLogs
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.amazonaws.com'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  AppDataKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/budgetbuddy-${Environment}'
      TargetKeyId: !Ref AppDataKey

  # DynamoDB Stack — all application tables (Users, Accounts, Transactions,
  # Budgets, Goals, AuditLogs, Household, Benchmarks, UserPreferences, etc.)
  # Added as a nested stack so `aws cloudformation deploy main-stack.yaml`
  # provisions new tables automatically; prior to this it was deployed
  # separately which meant table additions could silently miss a deploy.
  DynamoDBStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: dynamodb.yaml
      Parameters:
        Environment: !Ref Environment
        TablePrefix: BudgetBuddy
        KMSKeyId: !Ref AppDataKey
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy

  # SNS/SES Stack for Notifications
  SNSSESStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: sns-ses.yaml
      Parameters:
        Environment: !Ref Environment
        TablePrefix: BudgetBuddy
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy

  # Monitoring Stack for CloudWatch Dashboards and Alarms
  MonitoringStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: monitoring.yaml
      Parameters:
        Environment: !Ref Environment
        ECSClusterName: !Ref ECSCluster
        ALBArn: !GetAtt ApplicationLoadBalancer.LoadBalancerArn
        TargetGroupArn: !GetAtt ALBTargetGroup.TargetGroupArn
        SnsTopicArn: !GetAtt SNSSESStack.Outputs.SNSTopicArn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCId'
  
  SNSTopicArn:
    Description: SNS Topic ARN for notifications
    Value: !GetAtt SNSSESStack.Outputs.SNSTopicArn
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicArn'
  
  SESIdentityArn:
    Description: SES Identity ARN (constructed — SES::EmailIdentity exposes only the name, ARN is derived)
    Value: !Sub
      - 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${IdentityName}'
      - IdentityName: !GetAtt SNSSESStack.Outputs.SESIdentityName
    Export:
      Name: !Sub '${AWS::StackName}-SESIdentityArn'

  ECSClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${AWS::StackName}-ECSCluster'

  ALBDNSName:
    Description: Application Load Balancer DNS Name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALBDNS'

  ECRRepositoryURI:
    Description: ECR Repository URI
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-ECRRepository'

  ECSTaskExecutionRoleArn:
    Description: ECS Task Execution Role ARN
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ECSTaskExecutionRole'

  ECSTaskRoleArn:
    Description: ECS Task Role ARN
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ECSTaskRole'
  
  MonitoringDashboardUrl:
    Description: URL to CloudWatch Monitoring Dashboard
    Value: !GetAtt MonitoringStack.Outputs.DashboardUrl
    Export:
      Name: !Sub '${AWS::StackName}-MonitoringDashboard'
  
  ECSLogGroupName:
    Description: ECS Log Group Name
    Value: !GetAtt MonitoringStack.Outputs.LogGroupName
    Export:
      Name: !Sub '${AWS::StackName}-ECSLogGroup'

