AWSTemplateFormatVersion: '2010-09-09'
Description: 'BudgetBuddy Backend - CloudWatch Monitoring and Alarms'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
    Description: Deployment environment
  
  ECSClusterName:
    Type: String
    Description: Name of the ECS cluster
    Default: BudgetBuddy-cluster
  
  ALBArn:
    Type: String
    Description: ARN of the Application Load Balancer
  
  TargetGroupArn:
    Type: String
    Description: ARN of the ALB target group
  
  SnsTopicArn:
    Type: String
    Default: ''
    Description: SNS topic ARN for alarm notifications (optional)

Resources:
  # CloudWatch Log Group for ECS
  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/budgetbuddy-backend-${Environment}'
      RetentionInDays: 3  # Reduced to 3 days for cost optimization
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: budgetbuddy-backend

  # CloudWatch Dashboard
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'BudgetBuddy-${Environment}-Dashboard'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/ECS", "CPUUtilization", {"stat": "Average", "label": "CPU Utilization"}],
                  ["AWS/ECS", "MemoryUtilization", {"stat": "Average", "label": "Memory Utilization"}]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "ECS Service Metrics"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/ApplicationELB", "RequestCount", {"stat": "Sum", "label": "Request Count"}],
                  ["AWS/ApplicationELB", "TargetResponseTime", {"stat": "Average", "label": "Response Time"}]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Load Balancer Metrics"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", {"stat": "Sum", "label": "Read Capacity"}],
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", {"stat": "Sum", "label": "Write Capacity"}]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "DynamoDB Metrics"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/ApplicationELB", "HTTPCode_Target_5XX_Count", {"stat": "Sum", "label": "5XX Errors"}],
                  ["AWS/ApplicationELB", "HTTPCode_Target_4XX_Count", {"stat": "Sum", "label": "4XX Errors"}]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Error Rates"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["BudgetBuddy", "AuthenticationCount", {"stat": "Sum", "label": "Authentications"}],
                  ["BudgetBuddy", "AuthenticationFailureCount", {"stat": "Sum", "label": "Auth Failures"}],
                  ["BudgetBuddy", "MFASetupCount", {"stat": "Sum", "label": "MFA Setups"}],
                  ["BudgetBuddy", "FIDO2RegistrationCount", {"stat": "Sum", "label": "FIDO2 Registrations"}]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Authentication Metrics"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["BudgetBuddy", "AuditLogCount", {"stat": "Sum", "label": "Audit Logs"}],
                  ["BudgetBuddy", "ComplianceCheckCount", {"stat": "Sum", "label": "Compliance Checks"}],
                  ["BudgetBuddy", "RiskAssessmentCount", {"stat": "Sum", "label": "Risk Assessments"}]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Compliance & Audit Metrics"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["BudgetBuddy", "APIRequestCount", {"stat": "Sum", "label": "API Requests"}],
                  ["BudgetBuddy", "APIResponseTime", {"stat": "Average", "label": "Response Time (ms)"}],
                  ["BudgetBuddy", "RateLimitBlockedCount", {"stat": "Sum", "label": "Rate Limited"}]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "API Performance Metrics"
              }
            },
            {
              "type": "log",
              "properties": {
                "query": "SOURCE '/ecs/budgetbuddy-backend-${Environment}' | fields @timestamp, @message\n| filter @message like /ERROR/\n| stats count() by bin(5m)",
                "region": "${AWS::Region}",
                "title": "Error Logs (Last 1 Hour)",
                "view": "timeSeries",
                "stacked": false
              }
            }
          ]
        }

  # SNS Topic for Alarms (if not provided)
  AlarmSnsTopic:
    Type: AWS::SNS::Topic
    Condition: CreateSnsTopic
    Properties:
      TopicName: !Sub 'budgetbuddy-${Environment}-alarms'
      DisplayName: !Sub 'BudgetBuddy ${Environment} Alarms'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ECS CPU High Alarm
  ECSHighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-ecs-high-cpu'
      AlarmDescription: Alert when ECS CPU utilization exceeds 80%
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

  # ECS Memory High Alarm
  ECSHighMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-ecs-high-memory'
      AlarmDescription: Alert when ECS memory utilization exceeds 80%
      MetricName: MemoryUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

  # ALB High Error Rate Alarm
  ALBHighErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-alb-high-errors'
      AlarmDescription: Alert when ALB 5XX error rate exceeds threshold
      MetricName: HTTPCode_Target_5XX_Count
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref ALBArn
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

  # ALB High Response Time Alarm
  ALBHighResponseTimeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-alb-high-response-time'
      AlarmDescription: Alert when ALB response time exceeds 2 seconds
      MetricName: TargetResponseTime
      Namespace: AWS/ApplicationELB
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref ALBArn
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

  # Target Group Unhealthy Hosts Alarm
  TargetGroupUnhealthyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-tg-unhealthy'
      AlarmDescription: Alert when target group has unhealthy targets
      MetricName: UnHealthyHostCount
      Namespace: AWS/ApplicationELB
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: TargetGroup
          Value: !Ref TargetGroupArn
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

  # Application error-rate alarm — counts ERROR-level log lines from the ECS
  # log group, which covers both controller errors and scheduled-job failures
  # (BenchmarkAggregationService, DailyReadEmailService, PlaidSyncService etc.
  # all log via SLF4J, which writes to stdout → ECS logs).
  AppErrorLogMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ECSLogGroup
      FilterPattern: '?ERROR ?"severity=ERROR"'
      MetricTransformations:
        - MetricNamespace: !Sub 'BudgetBuddy/${Environment}'
          MetricName: AppErrorCount
          MetricValue: '1'
          DefaultValue: 0

  AppErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-app-error-rate'
      AlarmDescription: >-
        Alert when application error log rate exceeds baseline. Covers
        controller 5xx paths AND scheduled-job failures (cron jobs publish
        errors to the same log group).
      MetricName: AppErrorCount
      Namespace: !Sub 'BudgetBuddy/${Environment}'
      Statistic: Sum
      Period: 300   # 5-min windows
      EvaluationPeriods: 2
      Threshold: 20 # > 20 errors in 10 min = paging-worthy
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

  # Scheduled-job heartbeat — BenchmarkAggregationService logs a heartbeat line
  # daily. If the count is zero for > 36h we've missed a run. Applies the same
  # pattern to any cron by adjusting FilterPattern per-service.
  BenchmarkAggregationMissedRunAlarm:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ECSLogGroup
      FilterPattern: '"Benchmark aggregation starting"'
      MetricTransformations:
        - MetricNamespace: !Sub 'BudgetBuddy/${Environment}'
          MetricName: BenchmarkAggregationRuns
          MetricValue: '1'
          DefaultValue: 0

  BenchmarkAggregationStalledAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-benchmark-cron-stalled'
      AlarmDescription: Benchmark aggregation hasn't logged a run in >36 h.
      MetricName: BenchmarkAggregationRuns
      Namespace: !Sub 'BudgetBuddy/${Environment}'
      Statistic: Sum
      Period: 3600  # 1 h windows
      EvaluationPeriods: 36
      DatapointsToAlarm: 36
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

  # Plaid sync health — PlaidSyncOrchestrator emits plaid.sync.success and
  # plaid.sync.failure metrics on every per-user sync. A silent Plaid
  # outage previously only surfaced via customer complaints; these alarms
  # turn both degraded and dead failure modes into paging signals.
  PlaidSyncFailureRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-plaid-sync-failure-rate'
      AlarmDescription: 'More than 10 Plaid sync failures in 15 min — likely Plaid API outage or auth regression.'
      MetricName: plaid.sync.failure
      Namespace: !Sub 'BudgetBuddy/${Environment}'
      Statistic: Sum
      Period: 900  # 15 min
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

  PlaidSyncSilentAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-plaid-sync-silent'
      AlarmDescription: 'Zero Plaid syncs (success OR failure) for 12h — orchestrator is wedged, not just Plaid.'
      MetricName: plaid.sync.success
      Namespace: !Sub 'BudgetBuddy/${Environment}'
      Statistic: Sum
      Period: 3600  # 1h windows
      EvaluationPeriods: 12
      DatapointsToAlarm: 12
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

  # Balance-drift surveillance — BalanceReconciliationService emits
  # balance.drift.abs per account after each sync. Sustained drift above
  # $50 suggests a categorization bug or a missing transaction class.
  BalanceDriftHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'budgetbuddy-${Environment}-balance-drift-high'
      AlarmDescription: 'Average Plaid-vs-derived balance drift exceeds $50 — investigate ingest or categorization.'
      MetricName: balance.drift.abs
      Namespace: !Sub 'BudgetBuddy/${Environment}'
      Statistic: Average
      Period: 900
      EvaluationPeriods: 4
      DatapointsToAlarm: 3
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [UseSnsTopic, !Ref SnsTopicArn, !Ref AlarmSnsTopic]

Conditions:
  CreateSnsTopic: !Equals [!Ref SnsTopicArn, '']
  UseSnsTopic: !Not [!Equals [!Ref SnsTopicArn, '']]

Outputs:
  DashboardUrl:
    Description: URL to CloudWatch Dashboard
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${MonitoringDashboard}'
  
  LogGroupName:
    Description: Name of the ECS log group
    Value: !Ref ECSLogGroup

