AWSTemplateFormatVersion: '2010-09-09'
Description: 'SNS and SES resources for BudgetBuddy notifications (MFA OTP, alerts)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - production
    Description: Environment name

  TablePrefix:
    Type: String
    Default: BudgetBuddy
    Description: Prefix for DynamoDB table names

Resources:
  # SNS Topic for SMS notifications (MFA OTP)
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${TablePrefix}-Notifications-${Environment}'
      DisplayName: !Sub 'BudgetBuddy Notifications ${Environment}'
      KmsMasterKeyId: alias/aws/sns  # CKV_AWS_26
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # SNS Topic Policy
  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - ses.amazonaws.com
                - lambda.amazonaws.com
            Action:
              - SNS:Publish
            Resource: !Ref SNSTopic

  # SES Configuration Set — enforces TLS on outbound email. Enum values are
  # CloudFormation-case-sensitive; must be uppercase per the SES CFN schema.
  SESConfigurationSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: !Sub '${TablePrefix}-EmailConfig-${Environment}'
      DeliveryOptions:
        TlsPolicy: REQUIRE

  # SES Identity (Email Domain). Send-permission grants are attached to the
  # ECS task IAM role (see main-stack.yaml `SESSendEmail` inline policy) —
  # SES has no `IdentityPolicy` CFN resource, so that is the correct path.
  SESIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Sub 'noreply@${TablePrefix}.com'
      ConfigurationSetAttributes:
        ConfigurationSetName: !Ref SESConfigurationSet
      MailFromAttributes:
        MailFromDomain: !Sub 'mail.${TablePrefix}.com'
        BehaviorOnMxFailure: USE_DEFAULT_VALUE

Outputs:
  SNSTopicArn:
    Description: ARN of the SNS topic for notifications
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicArn'

  SESIdentityName:
    Description: Name of the SES identity (construct ARN as arn:aws:ses:region:account:identity/<name>)
    Value: !Ref SESIdentity
    Export:
      Name: !Sub '${AWS::StackName}-SESIdentityName'

  SESConfigurationSetName:
    Description: Name of the SES configuration set
    Value: !Ref SESConfigurationSet
    Export:
      Name: !Sub '${AWS::StackName}-SESConfigurationSetName'
