AWSTemplateFormatVersion: '2010-09-09'
Description: 'BudgetBuddy Backend - DynamoDB Tables Stack'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
    Description: Deployment environment
  
  TablePrefix:
    Type: String
    Default: BudgetBuddy
    Description: Prefix for DynamoDB table names
  
  KMSKeyId:
    Type: String
    Default: ''
    Description: Optional KMS key ID for encryption (if not provided, uses AWS managed key)

Conditions:
  HasKMSKey: !Not [!Equals [!Ref KMSKeyId, '']]

Resources:
  # Users Table
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-Users'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Accounts Table
  AccountsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-Accounts'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: accountId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: plaidAccountId
          AttributeType: S
      KeySchema:
        - AttributeName: accountId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: PlaidAccountIdIndex
          KeySchema:
            - AttributeName: plaidAccountId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Transactions Table
  TransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-Transactions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: transactionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: accountId
          AttributeType: S
        - AttributeName: transactionDate
          AttributeType: S
        - AttributeName: plaidTransactionId
          AttributeType: S
        - AttributeName: goalId
          AttributeType: S
      KeySchema:
        - AttributeName: transactionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdDateIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: transactionDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: AccountIdTransactionDateIndex
          KeySchema:
            - AttributeName: accountId
              KeyType: HASH
            - AttributeName: transactionDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: PlaidTransactionIdIndex
          KeySchema:
            - AttributeName: plaidTransactionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: UserIdGoalIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: goalId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # PDF Import Jobs Table
  # Stores async PDF-import jobs (QUEUED/PROCESSING/COMPLETED/FAILED).
  # Backed by PdfImportJobService; polled by iOS via
  # /api/transactions/import-pdf/jobs/{id}. TTL set to 7d on
  # completedAt — jobs aren't archived once the user has the results.
  PdfImportJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-PdfImportJobs'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: updatedAtTimestamp
          AttributeType: N
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdCreatedAtIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: updatedAtTimestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false  # Jobs are ephemeral
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: Component
          Value: PdfImport
        - Key: ManagedBy
          Value: CloudFormation

  # Budgets Table
  # Cost Optimization: Streams and PITR disabled (can use polling/eventual consistency)
  BudgetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-Budgets'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: budgetId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: budgetId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      # Point-in-time recovery on Budgets — restoration within 35 days for
      # currency-bearing rows. Cost: <$0.20/month per GB at current scale.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Goals Table
  # Cost Optimization: Streams and PITR disabled (can use polling/eventual consistency)
  GoalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-Goals'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: goalId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: targetDate
          AttributeType: S
      KeySchema:
        - AttributeName: goalId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        # Goals-by-target-date GSI so the nudge service can query upcoming
        # deadlines without scanning. Sort by targetDate per user.
        - IndexName: UserIdTargetDateIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: targetDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # Point-in-time recovery enabled for data-bearing tables. Accidental
      # writes/deletes on goal/budget rows are user-visible; 35-day restore
      # window is the guardrail.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Transaction Actions Table
  # Cost Optimization: Streams and PITR disabled (can use polling/eventual consistency)
  TransactionActionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-TransactionActions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: actionId
          AttributeType: S
        - AttributeName: transactionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: actionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TransactionIdIndex
          KeySchema:
            - AttributeName: transactionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      # Point-in-time recovery enabled for data-bearing tables. Accidental
      # writes/deletes on goal/budget rows are user-visible; 35-day restore
      # window is the guardrail.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Audit Logs Table
  # Cost Optimization: Streams and PITR disabled (audit logs can use S3 archival)
  AuditLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-AuditLogs'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: auditLogId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: N
        - AttributeName: action
          AttributeType: S
      KeySchema:
        - AttributeName: auditLogId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdCreatedAtIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ActionCreatedAtIndex
          KeySchema:
            - AttributeName: action
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # StreamSpecification: Disabled for cost optimization (audit logs don't need real-time processing)
      # PointInTimeRecoverySpecification: Disabled for cost optimization (use S3 archival instead)
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Rate Limit Table
  RateLimitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-RateLimits'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # DDoS Protection Table
  DDoSProtectionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-DDoSProtection'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ipAddress
          AttributeType: S
      KeySchema:
        - AttributeName: ipAddress
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Device Attestation Table
  DeviceAttestationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-DeviceAttestation'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Device Tokens Table (for push notifications)
  # Cost Optimization: Streams disabled (token changes are infrequent)
  # PITR disabled for cost optimization (device tokens can be re-registered)
  DeviceTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-DeviceTokens'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: deviceToken
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: deviceToken
          KeyType: RANGE
      # StreamSpecification: Disabled for cost optimization (token changes are infrequent)
      # PointInTimeRecoverySpecification: Disabled for cost optimization (tokens can be re-registered)
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Device PIN Table
  # Cost Optimization: Streams and PITR disabled (PIN changes are infrequent)
  DevicePinTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-DevicePin'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: deviceId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: deviceId
          KeyType: RANGE
      # StreamSpecification: Disabled for cost optimization (PIN changes are infrequent)
      # PointInTimeRecoverySpecification: Disabled for cost optimization (use regular backups instead)
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # 404 Error Tracking Table
  NotFoundTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-NotFoundTracking'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sourceId
          AttributeType: S
      KeySchema:
        - AttributeName: sourceId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # FIDO2 Credentials Table (for WebAuthn/Passkey storage)
  # Cost Optimization: Streams disabled, PITR kept (security credentials are critical)
  FIDO2CredentialsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-FIDO2Credentials'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: credentialId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: credentialId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      # StreamSpecification: Disabled for cost optimization (credential changes are infrequent)
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true  # Kept for security credentials
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # FIDO2 Challenges Table (for registration/authentication challenges with TTL)
  FIDO2ChallengesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-FIDO2Challenges'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: challengeKey
          AttributeType: S
      KeySchema:
        - AttributeName: challengeKey
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # MFA Credentials Table (for TOTP secrets)
  # Cost Optimization: Streams and PITR disabled (can use regular backups)
  MFACredentialsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-MFACredentials'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: mfaType
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: mfaType
          KeyType: RANGE
      # StreamSpecification: Disabled for cost optimization (MFA changes are infrequent)
      # PointInTimeRecoverySpecification: Disabled for cost optimization (use regular backups instead)
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # MFA Backup Codes Table
  # Cost Optimization: Streams and PITR disabled (backup code changes are infrequent)
  MFABackupCodesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-MFABackupCodes'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: codeHash
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: codeHash
          KeyType: RANGE
      # StreamSpecification: Disabled for cost optimization (backup code changes are infrequent)
      # PointInTimeRecoverySpecification: Disabled for cost optimization (use regular backups instead)
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # MFA OTP Codes Table (for SMS/Email OTP with TTL)
  MFAOTPCodesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-MFAOTPCodes'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: otpKey
          AttributeType: S
      KeySchema:
        - AttributeName: otpKey
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # User Corrections Table (for learning from user category corrections)
  # Cost Optimization: Streams and PITR disabled (corrections can use regular backups)
  UserCorrectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-UserCorrections'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: correctionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: merchantName
          AttributeType: S
        - AttributeName: correctedAtTimestamp
          AttributeType: N
      KeySchema:
        - AttributeName: correctionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdMerchantIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: merchantName
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: UserIdDateIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: correctedAtTimestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # StreamSpecification: Disabled for cost optimization (corrections are batch processed)
      # PointInTimeRecoverySpecification: Disabled for cost optimization (use regular backups instead)
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Custom Merchant Mappings Table (for user-defined merchant/category mappings)
  # Cost Optimization: Streams and PITR disabled (mappings can use regular backups)
  CustomMerchantMappingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-CustomMerchantMappings'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: mappingId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: merchantName
          AttributeType: S
      KeySchema:
        - AttributeName: mappingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdMerchantIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: merchantName
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # StreamSpecification: Disabled for cost optimization (mappings are infrequently changed)
      # PointInTimeRecoverySpecification: Disabled for cost optimization (use regular backups instead)
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
          # Uses AWS managed key (alias/aws/dynamodb) if KMSKeyId is empty
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Merchant Enrichment Cache Table — persistent learning store for
  # categorisations discovered by external sources (OSM, Wikidata,
  # Foursquare, …) and the LLM self-review loop. Keyed by
  # (normalisedMerchant|city|state|country). One row per unique merchant
  # location. 365-day TTL with DynamoDB auto-eviction.
  MerchantEnrichmentCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-MerchantEnrichmentCache'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cacheKey
          AttributeType: S
      KeySchema:
        - AttributeName: cacheKey
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Security: Server-side encryption (KMS - uses AWS managed key if KMSKeyId not provided)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Uncategorised Review Items — durable queue for the LLM self-learning
  # loop. CategoryCascade L0-L8 fall-throughs land here; SelfLearningWorker
  # drains, calls the LLM suggester, and writes accepted suggestions to
  # MerchantEnrichmentCache. 7-day TTL auto-evicts stale items.
  UncategorisedReviewItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-UncategorisedReviewItems'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: itemId
          AttributeType: S
      KeySchema:
        - AttributeName: itemId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Household Table (for partner / household sharing)
  # One row per inviter user. GSI on invitee email so the accept-invitation
  # endpoint can look up by email.
  HouseholdTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-Household'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: inviteeEmail
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: InviteeEmailIndex
          KeySchema:
            - AttributeName: inviteeEmail
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Benchmarks Table (aggregated percentile bands by bucket)
  # One row per (bucket, category). bucketId = e.g. "inc-75-150k-hh-1-2".
  BenchmarksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-Benchmarks'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: bucketId
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: bucketId
          KeyType: HASH
        - AttributeName: category
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # User Preferences Table (notification opt-ins, daily-read hour, etc.)
  # Partitioned by userId; one row per user.
  #
  # Two sparse GSIs replace the full-table scans the daily jobs used:
  #   - DailyReadEmailOptInIndex: `dailyReadEmailEnabledFlag` is populated only
  #     when the user opts in. Query over this GSI returns only opt-in rows.
  #   - AnonymisedStatsOptInIndex: same pattern for the benchmark aggregation.
  # The repository writes the flag string on opt-in, null on opt-out, keeping
  # the indexes sparse.
  UserPreferencesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-UserPreferences'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: dailyReadEmailEnabledFlag
          AttributeType: S
        - AttributeName: anonymisedStatsOptInFlag
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DailyReadEmailOptInIndex
          KeySchema:
            - AttributeName: dailyReadEmailEnabledFlag
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: AnonymisedStatsOptInIndex
          KeySchema:
            - AttributeName: anonymisedStatsOptInFlag
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      # PITR enabled for Checkov CKV_AWS_28 compliance.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation

  # Plaid Access Tokens — backend-side store so the scheduled sync path can iterate
  # every user's Plaid items without a live client request to fetch the keychain
  # token. Encrypted at rest via the same customer-managed CMK as the other
  # sensitive tables; PITR enabled because access-token loss locks every user out
  # of incremental Plaid sync until they re-link.
  PlaidAccessTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-PlaidAccessTokens'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: plaidItemId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: plaidItemId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: PlaidItemIdIndex
          KeySchema:
            - AttributeName: plaidItemId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !If
          - HasKMSKey
          - !Ref KMSKeyId
          - !Ref AWS::NoValue
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: BudgetBuddy
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Sensitive
          Value: 'true'

